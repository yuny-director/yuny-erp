<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YUNY_ERP - 작업물량 및 근태 입력</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f6f9; }
        .content { padding: 30px; }
        .card { background-color: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h2 { margin-top: 0; color: #333; margin-bottom: 15px; font-size: 20px; }
        .flex-form-row { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 6px; font-weight: bold; font-size: 14px; color: #555; }
        .form-group input, .form-group select { padding: 0 10px; border: 1px solid #ccc; border-radius: 4px; width: 180px; height: 38px; box-sizing: border-box; font-size: 14px; }
        
        .btn { padding: 0 18px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; height: 38px; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; transition: background 0.2s; box-sizing: border-box; }
        .btn:hover { background-color: #219653; }
        .time-btn { padding: 0 12px; background-color: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; height: 38px; box-sizing: border-box; }
        .time-btn:hover { background-color: #2471a3; }
        .btn-submit-time { background-color: #34495e; }
        .btn-submit-time:hover { background-color: #2c3e50; }
        
        .table-container { width: 100%; overflow-x: auto; border: 1px solid #ccc; border-radius: 6px; background: white; }
        table { border-collapse: separate !important; border-spacing: 0; font-size: 14px; width: auto; min-width: 100%; }
        th, td { border-right: 1px solid #ccc; border-bottom: 1px solid #ccc; padding: 12px 10px; text-align: center; white-space: nowrap !important; box-sizing: border-box; }
        th { background-color: #f2f2f2; font-weight: bold; position: sticky; top: 0; z-index: 10; border-top: 1px solid #ccc; }
        
        .fix-wrk-1 { position: sticky !important; left: 0px !important; width: 100px !important; min-width: 100px !important; max-width: 100px !important; background: #fff !important; z-index: 5; flex-shrink: 0 !important; }
        .fix-wrk-2 { position: sticky !important; left: 100px !important; width: 90px !important; min-width: 90px !important; max-width: 90px !important; background: #fff !important; z-index: 5; flex-shrink: 0 !important; }
        .fix-wrk-3 { position: sticky !important; left: 190px !important; width: 130px !important; min-width: 130px !important; max-width: 130px !important; background: #fbfbfb !important; z-index: 5; border-right: 3px solid #aaa !important; font-weight: bold; flex-shrink: 0 !important; }
        th.fix-wrk-1, th.fix-wrk-2, th.fix-wrk-3 { z-index: 12 !important; background-color: #f2f2f2 !important; }
        .attendance-row { background-color: #edf2ff; font-weight: bold; color: #364fc7; }
        .attendance-row td { background-color: #edf2ff !important; min-width: 150px; }
        .attendance-row td.fix-wrk-1, .attendance-row td.fix-wrk-2, .attendance-row td.fix-wrk-3 { background-color: #edf2ff !important; z-index: 6 !important; }
        .worker-text { color: #27ae60; font-weight: bold; }
        .divider { color: #ccc; align-self: flex-end; padding-bottom: 8px; font-size: 18px; margin: 0 5px; }
    </style>
    <script src="../config.js"></script>
</head>
<body>

<div id="global-navbar"></div>
<script src="../navbar2.js?v=2026_final_v3"></script>

<div class="content">
    <div class="card" style="background-color: #fff9db; border: 2px solid #fab005; padding: 15px 25px;">
        <div class="flex-form-row" style="align-items: center;">
            <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px;">
                <label style="color: #e67e22; margin-bottom: 0; font-size: 15px; font-weight: bold;">📅 정산 명세 확인 연월 선택 :</label>
                <select id="filterYear" style="width: 110px; height:35px;"></select>
                <select id="filterMonth" style="width: 90px; height:35px;"></select>
                <label style="color: #555; margin-bottom: 0; font-size: 14px; font-weight: bold; margin-left: 20px;">기록 전송일 선택 :</label>
                <input type="date" id="globalWorkDate" style="width: 180px; height:35px;">
            </div>
            <span id="loadingStatus" style="font-weight: bold; color: #27ae60; margin-left: 15px;">🔄 데이터 동기화 중...</span>
        </div>
    </div>

    <div class="card">
        <div class="flex-form-row">
            <div class="form-group"><label>본인 이름</label><input type="text" id="wrkNameInput" readonly style="background:#eee;"></div>
            <div class="form-group"><label>작업 품목 선택</label><select id="wrkItemSelect"></select></div>
            <div class="form-group"><label>생산 수량</label><input type="number" id="wrkQty" value="95"></div>
            <button class="btn" onclick="addWorkQty()">작업물량 전송</button>
            <div class="divider">|</div>
            <div class="form-group">
                <label>출근 시간 기록</label>
                <input type="text" id="wrkIn" placeholder="출근 전" readonly style="background:#f8f9fa; width:120px;">
            </div>
            <button class="time-btn" onclick="setCurrentTime('wrkIn')">출근 도장</button>
            <div class="form-group">
                <label>퇴근 시간 기록</label>
                <input type="text" id="wrkOut" placeholder="퇴근 전" readonly style="background:#f8f9fa; width:120px;">
            </div>
            <button class="time-btn" style="background-color:#e67e22;" onclick="setCurrentTime('wrkOut')">퇴근 도장</button>
            <button class="btn btn-submit-time" onclick="saveAttendance()">출퇴근 전송</button>
        </div>
    </div>

    <div class="card">
        <h2>📊 본인의 일자별 수량 및 출퇴근 기록 확인 표 (개인 전용)</h2>
        <div class="table-container">
            <table id="pivotTable"></table>
        </div>
    </div>
</div>

<script>
    var serverWorkersPool = []; var serverHourlyRates = {};
    var itemPrices = {}; var rawEntries = []; var myName = "";

    window.onload = function() {
        var auth = checkPageAuth('worker'); if(!auth) return;
        myName = auth.username; window.myName = myName;
        document.getElementById('wrkNameInput').value = myName;
        var now = new Date(); var currentYear = now.getFullYear(); var currentMonth = now.getMonth() + 1;
        
        var ySel = document.getElementById("filterYear");
        for(var y = currentYear - 2; y <= currentYear + 1; y++) { ySel.innerHTML += `<option value="${y}" ${y===currentYear?'selected':''}>${y}년</option>`; }
        var mSel = document.getElementById("filterMonth");
        for(var m = 1; m <= 12; m++) { mSel.innerHTML += `<option value="${m}" ${m===currentMonth?'selected':''}>${m}월</option>`; }
        
        document.getElementById('globalWorkDate').value = now.toISOString().split('T')[0];
        ySel.onchange = buildPivotTable; mSel.onchange = buildPivotTable;
        loadData();
    };

    function loadData() {
        fetch(GOOGLE_SCRIPT_URL).then(r => r.json()).then(data => {
            serverWorkersPool = data.workersPool || []; serverHourlyRates = data.hourlyRates || {};
            itemPrices = data.itemPrices || {}; rawEntries = data.rawEntries || [];
            renderDropdowns(); buildPivotTable();
            document.getElementById('loadingStatus').innerText = "✅ 시스템 동기화 완료";
        });
    }

    // 🧠 괄호 -> 공백 자동 치환 및 역변환 함수들
    function convertRawItemToDisplay(rawItem) {
        if(rawItem.indexOf("(") > -1 && rawItem.indexOf(")") > -1) {
            return rawItem.replace("(", " ").replace(")", "");
        }
        return rawItem;
    }
    function convertDisplayItemToRaw(displayItem) {
        var parts = displayItem.split(" ");
        if(parts.length > 1) {
            return parts[0] + "(" + parts[1] + ")";
        }
        return displayItem;
    }

    function renderDropdowns() {
        var s = document.getElementById('wrkItemSelect'); s.innerHTML = "";
        for (var i in itemPrices) {
            // 👤 작업자 선택창 전용: 스포이드(핑크) -> 스포이드 핑크 로 변환 출력
            var displayText = convertRawItemToDisplay(i);
            s.innerHTML += `<option value="${i}">${displayText}</option>`;
        }
    }

    function addWorkQty() {
        var date = document.getElementById('globalWorkDate').value;
        var selectedItemValue = document.getElementById('wrkItemSelect').value; // 괄호형 원본 데이터 값 추출
        
        var entry = { date: date, type: 'worker', name: myName, item: selectedItemValue, qty: Number(document.getElementById('wrkQty').value) };
        var idx = rawEntries.findIndex(x => x.date === entry.date && x.name === entry.name && x.item === entry.item && x.type === 'worker');
        if(idx > -1) rawEntries[idx] = entry; else rawEntries.push(entry);
        
        document.getElementById('loadingStatus').innerText = "📤 물량 기록 전송 중...";
        var payload = { action: "syncAll", updater: myName, summary: `${myName} 물량 전송`, workersPool: serverWorkersPool, itemPrices: itemPrices, rawEntries: rawEntries, hourlyRates: serverHourlyRates };
        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }).then(() => { alert("물량이 전송 완료되었습니다!"); loadData(); });
    }

    function setCurrentTime(id) { var now = new Date(), h = now.getHours(), m = now.getMinutes(); var ampm = h >= 12 ? '오후' : '오전'; h = h % 12 || 12; m = m < 10 ? '0' + m : m; document.getElementById(id).value = `${ampm} ${h}:${m}`; }
    function saveAttendance() { var date = document.getElementById('globalWorkDate').value; var newIn = document.getElementById('wrkIn').value.trim(); var newOut = document.getElementById('wrkOut').value.trim(); if(!newIn && !newOut) return; var exist = rawEntries.find(x => x.date === date && x.name === myName && x.type === 'attendance'); var finalIn = "미입력", finalOut = "미입력"; if(exist && exist.time && exist.time.indexOf("~") > -1) { var p = exist.time.split("~"); finalIn = p[0].trim(); finalOut = p[1].trim(); } if(newIn !== "") finalIn = newIn; if(newOut !== "") finalOut = newOut; var entry = { date: date, name: myName, type: 'attendance', item: '통합근무', time: `${finalIn} ~ ${finalOut}` }; var idx = rawEntries.findIndex(x => x.date === date && x.name === myName && x.type === 'attendance'); if(idx > -1) rawEntries[idx] = entry; else rawEntries.push(entry); document.getElementById('loadingStatus').innerText = "📤 근태 정보 전송 중..."; var payload = { action: "syncAll", updater: myName, summary: `${myName} 출퇴근 도장`, workersPool: serverWorkersPool, itemPrices: itemPrices, rawEntries: rawEntries, hourlyRates: serverHourlyRates }; fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }).then(() => { alert("출퇴근 기록 완장 합산 완료!"); loadData(); }); }
    function formatDateToMd(dateStr) { if (!dateStr) return ""; var parts = dateStr.replace(/\//g, '-').split('-'); if (parts.length < 3) return dateStr; return (parseInt(parts[1],10)<10?'0'+parseInt(parts[1],10):parseInt(parts[1],10)) + '/' + (parseInt(parts[2],10)<10?'0'+parseInt(parts[2],10):parseInt(parts[2],10)); }

    function buildPivotTable() {
        var table = document.getElementById('pivotTable'); table.innerHTML = "";
        var myEntries = rawEntries.filter(e => e.name === myName);
        var selYear = parseInt(document.getElementById("filterYear").value);
        var selMonth = parseInt(document.getElementById("filterMonth").value);
        var lastDay = new Date(selYear, selMonth, 0).getDate();
        
        var dateSet = []; var strMonth = selMonth < 10 ? "0" + selMonth : String(selMonth);
        for(var d = 1; d <= lastDay; d++) { var strDay = d < 10 ? "0" + d : String(d); dateSet.push(strMonth + "/" + strDay); }

        var html = `<thead><tr><th class="fix-wrk-1">품목</th><th class="fix-wrk-2">구분</th><th class="fix-wrk-3">총 수량 / 시간</th>${dateSet.map(d=>`<th style="min-width:65px;">${d}</th>`).join('')}</tr></thead><tbody>`;
        var items = [];
        myEntries.forEach(e => { if(e.item && e.item !== '통합근무' && e.type === 'worker' && items.indexOf(e.item)===-1) items.push(e.item); });

        items.forEach(item => {
            var filtered = myEntries.filter(e => e.item === item && e.type === 'worker');
            var totalQty = 0;
            dateSet.forEach(d => { var f = filtered.find(x => formatDateToMd(x.date) === d && x.date.indexOf(String(selYear)) > -1); if(f) totalQty += Number(f.qty); });
            
            // 작업자 확인 표 겉모양도 깔끔하게 가공 표출
            var displayItemName = convertRawItemToDisplay(item);
            html += `<tr><td class="fix-wrk-1">${displayItemName}</td><td class="fix-wrk-2 worker-text">개인입력</td><td class="fix-wrk-3" style="font-weight:bold;">${totalQty}개</td>${dateSet.map(d => { var f = filtered.find(x => formatDateToMd(x.date) === d && x.date.indexOf(String(selYear)) > -1); return `<td>${f?f.qty+'개':'-'}</td>`; }).join('')}</tr>`;
        });
        
        html += `<tr class="attendance-row"><td class="fix-wrk-1">통합근무</td><td class="fix-wrk-2">출퇴근확정</td><td class="fix-wrk-3">하루 근태 기록</td>`;
        dateSet.forEach(d => { var att = myEntries.find(e => e.type === 'attendance' && formatDateToMd(e.date) === d && e.date.indexOf(String(selYear)) > -1); html += `<td>${att ? att.time : '-'}</td>`; });
        html += `</tr>`; table.innerHTML = html + "</tbody>";
    }
</script>
</body>
</html>
