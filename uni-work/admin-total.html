<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUNY_ERP - 관리자 마스터 정산표</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f6f9; }
        .content { padding: 15px; }
        .flex-form-row { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 12px; margin-bottom: 15px; }
        .card { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 6px; font-weight: bold; font-size: 14px; color: #333; height: 16px; line-height: 16px; }
        .form-group input, .form-group select, .flex-form-row select { padding: 0 10px; border: 1px solid #ccc; border-radius: 4px; width: 160px; height: 38px; box-sizing: border-box; font-size: 14px !important; font-family: Arial, sans-serif; background-color: #ffffff; }
        .btn { padding: 0 18px; background-color: #1abc9c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; height: 38px; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; transition: background 0.2s; box-sizing: border-box; margin-bottom: 0px; }
        .btn:hover { background-color: #16a085; }
        .btn-dark-verify { background-color: #2c3e50; }
        .btn-dark-verify:hover { background-color: #34495e; }
        .btn-danger { background-color: #e74c3c !important; }
        .btn-orange { background-color: #e67e22 !important; }
        .btn-gray { background-color: #7f8c8d !important; }
        .btn-purple { background-color: #9b59b6 !important; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); align-items: center; justify-content: center; }
        .modal-content { background-color: #fff; padding: 25px; border-radius: 8px; width: 90%; max-width: 550px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .sortable-list { list-style: none; padding: 0; margin: 15px 0; }
        .sortable-item { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px 15px; margin-bottom: 8px; border-radius: 4px; cursor: grab; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .sortable-item.dragging { opacity: 0.5; background: #e8f4fd; border: 1px dashed #2980b9; }
        .sortable-item::after { content: '☰'; color: #aaa; font-size: 16px; }

        .table-container { width: 100%; max-height: 75vh; overflow: auto !important; border: 1px solid #ccc; border-radius: 6px; background: white; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate !important; border-spacing: 0 !important; font-size: 13px; width: auto; min-width: 100%; table-layout: fixed; }
        th, td { padding: 10px 6px; text-align: center; white-space: nowrap; box-sizing: border-box; border-right: 1px solid #ccc !important; border-bottom: 1px solid #ccc !important; }
        th { background-color: #f8f9fa !important; font-weight: bold; position: sticky !important; top: 0 !important; z-index: 30 !important; }
        
        .fix-col-1 { position: sticky !important; left: 0px !important; min-width: 65px; max-width: 65px; background: #ffffff !important; z-index: 10; }
        .fix-col-2 { position: sticky !important; left: 65px !important; min-width: 65px; max-width: 65px; background: #ffffff !important; z-index: 10; }
        .fix-col-3 { position: sticky !important; left: 130px !important; min-width: 105px; max-width: 130px; background: #ffffff !important; z-index: 10; }
        .fix-col-4 { position: sticky !important; left: 235px !important; min-width: 60px; max-width: 75px; background: #ffffff !important; z-index: 10; }
        .fix-col-5 { position: sticky !important; left: 295px !important; min-width: 75px; max-width: 95px; background: #fafafa !important; z-index: 10; }
        .fix-col-6 { position: sticky !important; left: 370px !important; min-width: 100px; max-width: 125px; background: #ffffff !important; z-index: 10; }
        .fix-col-7 { position: sticky !important; left: 470px !important; min-width: 100px; max-width: 120px; background: #f4fce3 !important; z-index: 10; font-weight: bold; border-right: 2px solid #999 !important; }
        
        th.fix-col-1, th.fix-col-2, th.fix-col-3, th.fix-col-4, th.fix-col-5, th.fix-col-6, th.fix-col-7 { z-index: 40 !important; }
        .admin-text { color: #2c3e50; font-weight: bold; }
        .worker-text { color: #27ae60; font-weight: bold; }
        
        .subtotal-row { background-color: #fff9db !important; font-weight: bold !important; color: #d9480f !important; }
        .subtotal-row td { background-color: #fff9db !important; }
        .divider { color: #ccc; font-size: 18px; margin: 0 5px; align-self: flex-end; padding-bottom: 10px; }
        .inline-edit-input { width: 95%; height: 26px; text-align: center; border: 2px solid #2980b9; border-radius: 4px; box-sizing: border-box; font-weight: bold; }
        .editable-cell { cursor: pointer; min-width: 50px; }
        .editable-time-cell { cursor: pointer; font-size: 11px !important; min-width: 210px; background: #edf2ff !important; color: #364fc7 !important; padding: 6px 6px !important; }
        .time-cell-wrap { display: inline-flex !important; align-items: center !important; justify-content: center !important; gap: 4px; width: 100%; text-align: center; }
        .time-display-span { display: inline-block; min-height: 18px; line-height: 18px; }
        .btn-toggle-apply { padding: 2px 4px; font-size: 10px; font-weight: bold; cursor: pointer; border-radius: 3px; border: 1px solid #ccc; flex-shrink: 0; line-height: 12px; }
        .rate-on { background-color: #2bc891 !important; color: white !important; }
        .rate-off { background-color: #e74c3c !important; color: white !important; }
    </style>
    <script src="../config.js"></script>
</head>
<body>

<div id="global-navbar"></div>
<script src="../navbar2.js"></script>

<div class="content">
    <div class="card" style="background-color: #fff9db; border: 2px solid #fab005; padding: 15px 25px;">
        <div class="flex-form-row" style="margin-bottom: 0;">
            <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px;">
                <label style="color: #e67e22; margin-bottom: 0; font-size: 14px; font-weight: bold;">📅 원장 연월 :</label>
                <select id="filterYear" style="width: 95px; height:36px;"></select>
                <select id="filterMonth" style="width: 75px; height:36px;"></select>
                <input type="date" id="globalWorkDate" style="width: 140px; height:36px; margin-left:10px;">
            </div>
            <span id="loadingStatus" style="font-weight: bold; color: #e67e22; font-size:13px; margin-left:10px; padding-bottom: 2px;">🔄 데이터 로드 중...</span>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="font-size:18px; margin: 0;">⚙️ 마스터 제어 콘솔</h2>
            <button class="btn btn-purple" id="btnSortModal">📊 품목 표시순서 관리</button>
        </div>
        <div class="flex-form-row">
            <div class="form-group">
                <label>새 작업자</label>
                <input type="text" id="newWorkerName" placeholder="이름 입력" style="width:130px;">
            </div>
            <button class="btn" id="btnAddWorker">명단 추가</button>
            <div class="divider">|</div>
            <div class="form-group">
                <label>새 품목명</label>
                <input type="text" id="newItemName" placeholder="예: 스포이드(핑크)" style="width:140px;">
            </div>
            <div class="form-group">
                <label>기본 단가</label>
                <input type="number" id="newItemCost" placeholder="원 단위" style="width:100px;">
            </div>
            <button class="btn" id="btnAddItem">품목 추가</button>
        </div>

        <div class="sub-section">
            <h4 style="margin: 0 0 12px 0; color: #2980b9; font-size: 14px;">💰 시급 및 일괄 정산</h4>
            <div class="flex-form-row">
                <div class="form-group">
                    <label>대상자</label>
                    <select id="rateWorkerSelect" style="width:120px;"></select>
                </div>
                <div class="form-group">
                    <label>시급 설정</label>
                    <input type="number" id="hourlyRateInput" style="width:110px;">
                </div>
                <button class="btn" id="btnSaveRate">원장 저장</button>
                <button class="btn btn-orange" id="btnRateAllApply">⚡당월전체반영</button>
                <button class="btn btn-gray" id="btnRateAllExclude">❌당월전체제외</button>
            </div>
        </div>
        
        <div class="sub-section">
            <h4 style="margin: 0 0 12px 0; color: #2980b9; font-size: 14px;">🗑️ 명단/품목 삭제</h4>
            <div class="flex-form-row">
                <div class="form-group">
                    <label style="visibility:hidden; display:block;">정렬패딩</label>
                    <select id="delWorkerSelect" style="width:130px; height:38px;"></select>
                </div>
                <button class="btn" id="btnDelWorker">명단 제거</button>
                <div class="divider">|</div>
                <div class="form-group">
                    <label style="visibility:hidden; display:block;">정렬패딩</label>
                    <select id="delItemSelect" style="width:140px; height:38px;"></select>
                </div>
                <button class="btn" id="btnDelItem">품목 제거</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>🛠️ 일일 데이터 입력</h2>
        <div class="flex-form-row">
            <div class="form-group">
                <label>작업자</label>
                <select id="admNameSelect" style="width:110px; height:38px;"></select>
            </div>
            <div class="form-group">
                <label>품목</label>
                <select id="admItemSelect" style="width:140px; height:38px;"></select>
            </div>
            <div class="form-group">
                <label>지정단가</label>
                <input type="number" id="admCost" style="width:100px;">
            </div>
            <div class="form-group">
                <label>수량</label>
                <input type="number" id="admQty" value="100" style="width:90px;">
            </div>
            <button class="btn btn-dark-verify" id="btnAddWorkRow">관리자기록등록</button>
        </div>
    </div>

    <div class="card">
        <h2>📊 유니 종합 마스터 정산 원장표</h2>
        <div class="table-container">
            <table id="pivotTable"></table>
        </div>
    </div>
</div>

<div id="sortModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0; color: #2c3e50;">↕️ 품목 순서 임의 조정</h3>
        <ul class="sortable-list" id="sortableList"></ul>
        <div style="display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px;">
            <button class="btn btn-gray" id="btnCloseSortModal">취소</button>
            <button class="btn" id="btnSaveItemOrder">순서 저장</button>
        </div>
    </div>
</div>

<script>
// 전역 상태 변수
var workersPool = [];
var itemPrices = {};
var rawEntries = [];
var hourlyRates = {};
var userList = [];
var myItemOrder = ["스포이드", "공병", "미스트(핑크)", "미스트(보라)", "지정품목"];

function customItemSort(a, b) {
    try {
        if (!myItemOrder || !Array.isArray(myItemOrder)) return 0;
        var idxA = myItemOrder.indexOf(a);
        var idxB = myItemOrder.indexOf(b);
        if (idxA === -1) idxA = 999;
        if (idxB === -1) idxB = 999;
        return idxA - idxB;
    } catch (e) { return 0; }
}

// 🎯 DOM 요소 로드가 모두 끝난 후 안전하게 이벤트 바인딩
document.addEventListener("DOMContentLoaded", function() {
    var now = new Date();
    var currentYear = now.getFullYear();
    var currentMonth = now.getMonth() + 1;
    var ySel = document.getElementById("filterYear");
    for(var y = currentYear - 2; y <= currentYear + 1; y++) {
        ySel.innerHTML += '<option value="' + y + '" ' + (y===currentYear?'selected':'') + '>' + y + '년</option>';
    }
    var mSel = document.getElementById("filterMonth");
    for(var m = 1; m <= 12; m++) {
        mSel.innerHTML += '<option value="' + m + '" ' + (m===currentMonth?'selected':'') + '>' + m + '월</option>';
    }
    document.getElementById('globalWorkDate').value = now.toISOString().split('T')[0];
    
    ySel.onchange = buildPivotTable;
    mSel.onchange = buildPivotTable;

    // 🔒 [이벤트 리스너 안전 연결]
    document.getElementById("btnAddWorker").addEventListener("click", addNewWorker);
    document.getElementById("btnAddItem").addEventListener("click", addNewItem);
    document.getElementById("btnDelWorker").addEventListener("click", deleteWorker);
    document.getElementById("btnDelItem").addEventListener("click", deleteItem);
    document.getElementById("btnSaveRate").addEventListener("click", saveHourlyRateSetting);
    document.getElementById("btnRateAllApply").addEventListener("click", function() { toggleAllRatesForWorker(true); });
    document.getElementById("btnRateAllExclude").addEventListener("click", function() { toggleAllRatesForWorker(false); });
    document.getElementById("btnAddWorkRow").addEventListener("click", addWorkRowData);
    document.getElementById("btnSortModal").addEventListener("click", openSortModal);
    document.getElementById("btnCloseSortModal").addEventListener("click", closeSortModal);
    document.getElementById("btnSaveItemOrder").addEventListener("click", saveItemOrder);
    
    document.getElementById("rateWorkerSelect").addEventListener("change", updateRateSettingHint);
    document.getElementById("admItemSelect").addEventListener("change", updateAdminCostHint);

    loadData();
});

function loadData() {
    if (typeof GOOGLE_SCRIPT_URL === "undefined") return;
    var cacheUrl = GOOGLE_SCRIPT_URL + (GOOGLE_SCRIPT_URL.indexOf('?') > -1 ? '&' : '?') + 't=' + Date.now();
    fetch(cacheUrl)
    .then(function(r) { return r.json(); })
    .then(function(data) {
        workersPool = Array.isArray(data.workersPool) ? data.workersPool : [];
        itemPrices = (data.itemPrices && typeof data.itemPrices === 'object') ? data.itemPrices : {};
        rawEntries = Array.isArray(data.rawEntries) ? data.rawEntries : [];
        hourlyRates = (data.hourlyRates && typeof data.hourlyRates === 'object') ? data.hourlyRates : {};
        userList = Array.isArray(data.userList) ? data.userList : [];
        if(data.itemOrder && Array.isArray(data.itemOrder)) { myItemOrder = data.itemOrder; }
        
        renderDropdowns();
        buildPivotTable();
        document.getElementById('loadingStatus').innerText = "✅ 실시간 동기화 완료";
    })
    .catch(function(err) {
        document.getElementById('loadingStatus').innerText = "❌ 데이터 동기화 지연";
        buildPivotTable();
    });
}

function syncWithGoogle(msg, callback) {
    document.getElementById('loadingStatus').innerText = "📤 구글 DB 업데이트 중...";
    var payload = {
        action: "syncAll",
        updater: "관리자",
        summary: msg,
        workersPool: workersPool,
        itemPrices: itemPrices,
        rawEntries: rawEntries,
        hourlyRates: hourlyRates,
        itemOrder: myItemOrder
    };

    fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
    })
    .then(function(res) { return res.json(); })
    .then(function(resData) {
        document.getElementById('loadingStatus').innerText = "✅ DB 저장 성공!";
        if (callback) callback();
        else loadData();
    })
    .catch(function(err) {
        document.getElementById('loadingStatus').innerText = "❌ 저장 완료";
        if (callback) callback();
        else loadData();
    });
}

function addNewWorker() {
    var inputEl = document.getElementById('newWorkerName');
    var n = inputEl ? inputEl.value.trim() : "";
    if(!n) { alert("추가할 작업자 이름을 입력해 주세요!"); return; }
    
    if(workersPool.indexOf(n) === -1) {
        workersPool.push(n);
        if(inputEl) inputEl.value = "";
        renderDropdowns();
        buildPivotTable();
        syncWithGoogle("작업자 명단 추가: " + n);
    } else {
        alert("이미 존재하는 작업자 이름입니다.");
    }
}

function addNewItem() {
    var nameEl = document.getElementById('newItemName');
    var costEl = document.getElementById('newItemCost');
    var i = nameEl ? nameEl.value.trim() : "";
    var c = costEl ? costEl.value : "";
    if(!i) { alert("추가할 품목명을 입력해 주세요!"); return; }
    if(!c || c === "") { alert("기본 단가를 입력해 주세요!"); return; }
    
    itemPrices[i] = Number(c);
    if(myItemOrder.indexOf(i) === -1) { myItemOrder.push(i); }
    if(nameEl) nameEl.value = "";
    if(costEl) costEl.value = "";
    renderDropdowns();
    buildPivotTable();
    syncWithGoogle("품목 추가: " + i + " (" + c + "원)");
}

function deleteWorker() {
    var n = document.getElementById('delWorkerSelect').value;
    if(!n) return;
    if(confirm("[" + n + "] 작업자를 정산 명단에서 삭제하시겠습니까?")) {
        workersPool = workersPool.filter(function(x) { return x !== n; });
        renderDropdowns();
        buildPivotTable();
        syncWithGoogle("명단 제거: " + n);
    }
}

function deleteItem() {
    var i = document.getElementById('delItemSelect').value;
    if(!i) return;
    if(confirm("[" + i + "] 품목을 단가표 및 명세서에서 삭제하시겠습니까?")) {
        delete itemPrices[i];
        myItemOrder = myItemOrder.filter(function(x) { return x !== i; });
        renderDropdowns();
        buildPivotTable();
        syncWithGoogle("품목 제거: " + i);
    }
}

function openSortModal() {
    var listContainer = document.getElementById("sortableList"); if(!listContainer) return;
    listContainer.innerHTML = "";
    var allItems = Object.keys(itemPrices || {}).sort(customItemSort);
    allItems.forEach(function(item) {
        var li = document.createElement("li"); li.className = "sortable-item"; li.draggable = true; li.innerText = item;
        li.addEventListener("dragstart", function() { li.classList.add("dragging"); });
        li.addEventListener("dragend", function() { li.classList.remove("dragging"); });
        listContainer.appendChild(li);
    });
    listContainer.addEventListener("dragover", function(e) {
        e.preventDefault(); var draggingItem = document.querySelector(".dragging"); if(!draggingItem) return;
        var siblings = Array.prototype.slice.call(listContainer.querySelectorAll(".sortable-item:not(.dragging)"));
        var nextSibling = siblings.find(function(sibling) { return e.clientY <= sibling.getBoundingClientRect().top + sibling.getBoundingClientRect().height / 2; });
        listContainer.insertBefore(draggingItem, nextSibling);
    });
    document.getElementById("sortModal").style.display = "flex";
}

function closeSortModal() { document.getElementById("sortModal").style.display = "none"; }

function saveItemOrder() {
    var items = Array.prototype.slice.call(document.querySelectorAll("#sortableList .sortable-item"));
    myItemOrder = items.map(function(li) { return li.innerText; });
    closeSortModal(); buildPivotTable(); renderDropdowns(); syncWithGoogle("정렬 순서 변경 저장");
}

function calculateHours(timeStr) {
    if(!timeStr || timeStr === "-" || timeStr.indexOf("~") === -1 || timeStr.indexOf("미입력") > -1) return 0;
    try {
        var parts = timeStr.split("~");
        var parseTime = function(t) {
            t = t.trim(); var isPm = t.indexOf("오후") > -1; var clean = t.replace("오전","").replace("오후","").trim();
            var hm = clean.split(":"); var h = Number(hm[0]); var m = Number(hm[1]) || 0;
            if(isPm && h < 12) h += 12; if(!isPm && h === 12) h = 0; return h + (m / 60);
        };
        var diff = parseTime(parts[1]) - parseTime(parts[0]); return diff > 0 ? Number(diff.toFixed(1)) : 0;
    } catch(e) { return 0; }
}

function parseMainItemAndOption(fullName) { if(fullName.indexOf("(") > -1 && fullName.indexOf(")") > -1) { var parts = fullName.split("("); return { main: parts[0].trim(), option: parts[1].replace(")", "").trim() }; } return { main: fullName, option: "" }; }

function buildPivotTable() {
    var table = document.getElementById('pivotTable'); if(!table) return;
    table.innerHTML = "";
    var selYear = parseInt(document.getElementById("filterYear").value) || new Date().getFullYear();
    var selMonth = parseInt(document.getElementById("filterMonth").value) || (new Date().getMonth() + 1);
    var lastDay = new Date(selYear, selMonth, 0).getDate();
    
    var dateSet = [];
    var strMonth = selMonth < 10 ? "0" + selMonth : String(selMonth);
    for(var d = 1; d <= lastDay; d++) {
        var strDay = d < 10 ? "0" + d : String(d);
        dateSet.push(selYear + "-" + strMonth + "-" + strDay);
    }
    
    var headerHtml = '<thead><tr><th class="fix-col-1">이름</th><th class="fix-col-2">구분</th><th class="fix-col-3">품목</th><th class="fix-col-4">단가</th><th class="fix-col-5">📦 금액</th><th class="fix-col-6">총수량 및 시간</th><th class="fix-col-7">📊 최종 합산 총액</th>' + dateSet.map(function(d) { return '<th style="min-width:65px;">' + d.substring(5).replace("-","/") + '</th>'; }).join('') + '</tr></thead>';
    var bodyHtml = "<tbody>";
    
    var totalAdminCost = 0, totalAdminQty = 0, totalWorkerQty = 0, totalWorkHours = 0, totalHourlyPaySum = 0, totalFinalGrandSum = 0;
    var dayAdminSums = {}; var dayWorkerSums = {}; dateSet.forEach(function(d) { dayAdminSums[d] = 0; dayWorkerSums[d] = 0; });
    var globalItemAdminQty = {}; var globalItemCost = {}; var workerGrandTotalsMap = {};
    var safeItemPrices = itemPrices || {}; var safeWorkers = Array.isArray(workersPool) ? workersPool : [];

    safeWorkers.forEach(function(name) {
        var nameEntries = rawEntries.filter(function(e) { return e.name === name; }); var itemsOfName = [];
        nameEntries.forEach(function(e) { if(e.item && e.item !== '통합근무' && itemsOfName.indexOf(e.item) === -1) itemsOfName.push(e.item); });
        if(itemsOfName.length === 0) itemsOfName.push("지정품목");
        
        itemsOfName.sort(customItemSort);
        
        var parentGroups = {};
        itemsOfName.forEach(function(item) {
            var p = parseMainItemAndOption(item);
            if(!parentGroups[p.main]) parentGroups[p.main] = [];
            parentGroups[p.main].push(item);
        });
        for (var groupKey in parentGroups) { parentGroups[groupKey].sort(customItemSort); }

        var totalRowsForName = 0;
        for (var groupKey in parentGroups) {
            var groupItems = parentGroups[groupKey];
            totalRowsForName += (groupItems.length * 2);
            if (groupItems.length > 1 || groupItems[0].indexOf("(") > -1) { totalRowsForName += 1; }
        }
        totalRowsForName += 1;

        var rateConfig = hourlyRates[name] || { rate: 9620, customDays: {} }; if(!rateConfig.customDays) rateConfig.customDays = {};
        var nameTotalHours = 0; var nameHourlyPay = 0; var dayAttendanceMap = {};
        
        dateSet.forEach(function(dateFull) {
            var attEnt = nameEntries.find(function(e) { return e.type === 'attendance' && e.date === dateFull; });
            var isDayApply = rateConfig.customDays[dateFull] !== false;
            if(attEnt && attEnt.time) {
                var hours = calculateHours(attEnt.time); nameTotalHours += hours;
                if(isDayApply) nameHourlyPay += (hours * rateConfig.rate);
                dayAttendanceMap[dateFull] = { time: attEnt.time, apply: isDayApply };
            } else { dayAttendanceMap[dateFull] = { time: "-", apply: isDayApply }; }
        });
        nameTotalHours = Number(nameTotalHours.toFixed(1)); totalWorkHours += nameTotalHours; totalHourlyPaySum += nameHourlyPay;
        var nameAdminCostSum = 0; var isFirstRow = true;

        for(var groupName in parentGroups) {
            var groupedItems = parentGroups[groupName]; var groupAdminSums = {}; var groupTotalAdminCost = 0; var groupTotalAdminQty = 0;
            dateSet.forEach(function(d) { groupAdminSums[d] = 0; });

            groupedItems.forEach(function(item) {
                var lastAdminEntry = nameEntries.find(function(e) { return e.item === item && e.type === 'admin'; });
                var cost = (lastAdminEntry ? Number(lastAdminEntry.cost) : (safeItemPrices[item] || 0));
                var sumAdminQty = 0, sumWorkerQty = 0;
                
                if (!globalItemAdminQty[item]) {
                    globalItemAdminQty[item] = { total: 0 };
                    dateSet.forEach(function(d) { globalItemAdminQty[item][d] = 0; });
                }
                globalItemCost[item] = cost;
                
                dateSet.forEach(function(dateFull) {
                    var aEnt = nameEntries.find(function(e) { return e.item === item && e.type === 'admin' && e.date === dateFull; });
                    var wEnt = nameEntries.find(function(e) { return e.item === item && e.type === 'worker' && e.date === dateFull; });
                    if(aEnt) {
                        var q = Number(aEnt.qty); sumAdminQty += q; groupAdminSums[dateFull] += q; dayAdminSums[dateFull] += q;
                        globalItemAdminQty[item][dateFull] += q; globalItemAdminQty[item].total += q;
                    }
                    if(wEnt) { var wq = Number(wEnt.qty); sumWorkerQty += wq; dayWorkerSums[dateFull] += wq; }
                });
                
                var sumAdminCost = cost * sumAdminQty;
                nameAdminCostSum += sumAdminCost; totalAdminCost += sumAdminCost; totalAdminQty += sumAdminQty; totalWorkerQty += sumWorkerQty;
                groupTotalAdminQty += sumAdminQty; groupTotalAdminCost += sumAdminCost;

                var adminRowHtml = '<tr>';
                if(isFirstRow) { adminRowHtml += '<td class="fix-col-1" rowspan="' + totalRowsForName + '" style="font-weight:bold; vertical-align:middle;">' + name + '</td>'; }
                adminRowHtml += '<td class="fix-col-2 admin-text">유니입력</td><td class="fix-col-3">' + item + '</td><td class="fix-col-4 admin-text">' + cost.toLocaleString() + '원</td><td class="fix-col-5 admin-text" style="background-color:#f8f9fa;">' + sumAdminCost.toLocaleString() + '원</td><td class="fix-col-6">' + sumAdminQty + '개</td>';
                if(isFirstRow) {
                    var secureId = name.replace(/[^a-zA-Z0-9가-힣]/g, '');
                    adminRowHtml += '<td class="fix-col-7" rowspan="' + totalRowsForName + '" style="vertical-align:middle;" id="grandTotalCell_' + secureId + '">계산중</td>'; isFirstRow = false;
                }
                
                dateSet.forEach(function(dateFull) {
                    var aEnt = nameEntries.find(function(e) { return e.item === item && e.type === 'admin' && e.date === dateFull; });
                    var wEnt = nameEntries.find(function(e) { return e.item === item && e.type === 'worker' && e.date === dateFull; });
                    var aQty = aEnt ? Number(aEnt.qty) : 0; var wQty = wEnt ? Number(wEnt.qty) : 0;
                    adminRowHtml += '<td class="editable-cell ' + ((aQty!==wQty&&aQty>0&&wQty>0)?'diff-warning':'') + '" onclick="makeCellEditable(this, \'' + selYear + '\', \'' + dateFull.substring(5).replace('-','/') + '\', \'' + name + '\', \'' + item + '\', \'admin\', ' + cost + ')">' + (aQty || '-') + '</td>';
                });
                adminRowHtml += '</tr>'; bodyHtml += adminRowHtml;

                var workerRowHtml = '<tr><td class="fix-col-2 worker-text">개인입력</td><td class="fix-col-3">' + item + '</td><td class="fix-col-4">-</td><td class="fix-col-5">-</td><td class="fix-col-6">' + sumWorkerQty + '개</td>';
                dateSet.forEach(function(dateFull) {
                    var aEnt = nameEntries.find(function(e) { return e.item === item && e.type === 'admin' && e.date === dateFull; });
                    var wEnt = nameEntries.find(function(e) { return e.item === item && e.type === 'worker' && e.date === dateFull; });
                    var aQty = aEnt ? Number(aEnt.qty) : 0; var wQty = wEnt ? Number(wEnt.qty) : 0;
                    workerRowHtml += '<td class="editable-cell ' + ((aQty!==wQty&&aQty>0&&wQty>0)?'diff-warning':'') + '" onclick="makeCellEditable(this, \'' + selYear + '\', \'' + dateFull.substring(5).replace('-','/') + '\', \'' + name + '\', \'' + item + '\', \'worker\', 0)">' + (wQty || '-') + '</td>';
                });
                workerRowHtml += '</tr>'; bodyHtml += workerRowHtml;
            });

            if(groupedItems.length > 1 || groupedItems[0].indexOf("(") > -1) {
                var subRowHtml = '<tr class="subtotal-row"><td class="fix-col-2">옵션소계</td><td class="fix-col-3">' + groupName + '(전체)</td><td class="fix-col-4">-</td><td class="fix-col-5">' + groupTotalAdminCost.toLocaleString() + '원</td><td class="fix-col-6">' + groupTotalAdminQty + '개</td>';
                dateSet.forEach(function(dateFull) { subRowHtml += '<td>' + (groupAdminSums[dateFull] || '-') + '</td>'; });
                subRowHtml += '</tr>'; bodyHtml += subRowHtml;
            }
        }
        
        var attendanceRowHtml = '<tr><td class="fix-col-2 admin-text" style="background:#edf2ff !important; color:#364fc7 !important;">출퇴근확정</td><td class="fix-col-3" style="background:#edf2ff !important; color:#364fc7; font-weight:bold;">통합근무</td><td class="fix-col-4" style="background:#edf2ff !important; color:#364fc7; font-weight:bold;">' + Number(rateConfig.rate).toLocaleString() + '원</td><td class="fix-col-5" style="background:#edf2ff !important; color:#364fc7; font-weight:bold;">' + nameHourlyPay.toLocaleString() + '원</td><td class="fix-col-6" style="background:#edf2ff !important; color:#0b7285; font-weight:bold;">' + nameTotalHours + '시간</td>';
        
        dateSet.forEach(function(dateFull) {
            var dayInfo = dayAttendanceMap[dateFull]; var btnClass = dayInfo.apply ? "rate-on" : "rate-off"; var btnText = dayInfo.apply ? "반영" : "미반영";
            attendanceRowHtml += '<td class="editable-time-cell" onclick="makeTimeCellEditable(this, \'' + selYear + '\', \'' + dateFull.substring(5).replace('-','/') + '\', \'' + name + '\', event)"><div class="time-cell-wrap"><span class="time-display-span">' + dayInfo.time + '</span><button class="btn-toggle-apply ' + btnClass + '" onclick="event.stopPropagation(); toggleSingleDayRate(\'' + name + '\', \'' + dateFull + '\', ' + dayInfo.apply + ')">' + btnText + '</button></div></td>';
        });
        attendanceRowHtml += '</tr>'; bodyHtml += attendanceRowHtml;

        workerGrandTotalsMap[name] = nameAdminCostSum + nameHourlyPay;
    });
    bodyHtml += "</tbody>";

    var footerHtml = "<tfoot>"; var activeItems = Object.keys(globalItemAdminQty); activeItems.sort(customItemSort);
    var isFirstSubRow = true;
    activeItems.forEach(function(item) {
        var itemCost = globalItemCost[item] || 0; var itemTotalQty = globalItemAdminQty[item].total; var itemTotalCost = itemCost * itemTotalQty;
        footerHtml += '<tr class="bg-total-item-sub">';
        if (isFirstSubRow) { footerHtml += '<td class="fix-col-1" rowspan="' + activeItems.length + '" style="vertical-align:middle; font-weight:bold;">품목별 소계</td>'; isFirstSubRow = false; }
        footerHtml += '<td class="fix-col-2 admin-text">유니입력</td><td class="fix-col-3" style="text-align: left; padding-left: 10px;">' + item + ' 소계</td><td class="fix-col-4">' + itemCost.toLocaleString() + '원</td><td class="fix-col-5">' + itemTotalCost.toLocaleString() + '원</td><td class="fix-col-6">' + itemTotalQty + '개</td><td class="fix-col-7">-</td>';
        dateSet.forEach(function(d) { var qVal = globalItemAdminQty[item][d]; footerHtml += '<td>' + (qVal || '-') + '</td>'; });
        footerHtml += '</tr>';
    });
    
    totalFinalGrandSum = totalAdminCost + totalHourlyPaySum;
    footerHtml += '<tr class="bg-total-row-1"><td class="fix-col-1" rowspan="2" style="vertical-align:middle; font-weight:bold;">최종 합계</td><td class="fix-col-2 admin-text">유니입력</td><td class="fix-col-3" rowspan="2" style="vertical-align:middle; font-weight:bold;">전체합산</td><td class="fix-col-4">-</td><td class="fix-col-5" style="background-color: #d0ebff !important;">' + (totalAdminCost + totalHourlyPaySum).toLocaleString() + '원</td><td class="fix-col-6" style="background-color: #e3fafc !important; padding: 4px 8px !important;"><div class="total-split-box"><span class="val-qty">' + totalAdminQty + '개</span><span class="val-hours">' + totalWorkHours.toFixed(1) + '시간</span></div></td><td class="fix-col-7" id="overallGrandTotalCell" style="background-color: #d3f9d8 !important; color:#2b8a3e; font-weight:bold;">계산중</td>' + dateSet.map(function(d) { return '<td>' + (dayAdminSums[d] || '-') + '</td>'; }).join('') + '</tr><tr class="bg-total-row-2"><td class="fix-col-2 worker-text">개인입력</td><td class="fix-col-4">-</td><td class="fix-col-5">-</td><td class="fix-col-6" style="font-weight: bold; color: #27ae60;">' + totalWorkerQty + '개</td><td class="fix-col-7">-</td>' + dateSet.map(function(d) { return '<td>' + (dayWorkerSums[d] || '-') + '</td>'; }).join('') + '</tr>';
    footerHtml += "</tfoot>";
    
    table.innerHTML = headerHtml + bodyHtml + footerHtml;
    
    setTimeout(function(){
        for(var name in workerGrandTotalsMap) {
            var secureId = name.replace(/[^a-zA-Z0-9가-힣]/g, ''); var cell = document.getElementById("grandTotalCell_" + secureId);
            if(cell) { cell.innerText = workerGrandTotalsMap[name].toLocaleString() + "원"; }
        }
        var finalCell = document.getElementById('overallGrandTotalCell'); if(finalCell) { finalCell.innerText = totalFinalGrandSum.toLocaleString() + "원"; }
    }, 30);
}

function toggleSingleDayRate(name, dateFull, currentApply) { if(!hourlyRates[name]) hourlyRates[name] = { rate: 9620, customDays: {} }; if(!hourlyRates[name].customDays) hourlyRates[name].customDays = {}; hourlyRates[name].customDays[dateFull] = !currentApply; buildPivotTable(); syncWithGoogle("[" + name + "] " + dateFull + " 반영여부 변경"); }
function toggleAllRatesForWorker(targetStatus) { var name = document.getElementById('rateWorkerSelect').value; var selYear = document.getElementById("filterYear").value; var selMonth = parseInt(document.getElementById("filterMonth").value); var lastDay = new Date(selYear, selMonth, 0).getDate(); if(!hourlyRates[name]) hourlyRates[name] = { rate: 9620, customDays: {} }; if(!hourlyRates[name].customDays) hourlyRates[name].customDays = {}; var strMonth = selMonth < 10 ? "0" + selMonth : String(selMonth); for(var d = 1; d <= lastDay; d++) { var strDay = d < 10 ? "0" + d : String(d); var dateFull = selYear + "-" + strMonth + "-" + strDay; hourlyRates[name].customDays[dateFull] = targetStatus; } buildPivotTable(); syncWithGoogle("[" + name + "] 계정 " + selMonth + "월 시급 일괄 정산 변경"); }
function makeCellEditable(cell, year, md, name, item, type, cost) { if (cell.querySelector('input')) return; var originalValue = cell.innerText === '-' ? '0' : cell.innerText.replace('개', ''); cell.innerHTML = '<input type="number" class="inline-edit-input" value="' + originalValue + '" onblur="saveInlineQty(this, \'' + year + '\', \'' + md + '\', \'' + name + '\', \'' + item + '\', \'' + type + '\', \'' + cost + '\')" onkeydown="if(event.key===\'Enter\') this.blur();">'; var input = cell.querySelector('input'); if(input) { input.focus(); input.select(); } }
function saveInlineQty(input, year, md, name, item, type, cost) { var newVal = parseInt(input.value) || 0; var dateFull = year + "-" + md.replace("/", "-"); var idx = rawEntries.findIndex(function(x) { return x.date === dateFull && x.name === name && x.item === item && x.type === type; }); if (newVal === 0) { if (idx > -1) rawEntries.splice(idx, 1); } else { var entry = { date: dateFull, type: type, name: name, item: item, qty: newVal }; if (type === 'admin') entry.cost = Number(cost); if (idx > -1) rawEntries[idx] = entry; else rawEntries.push(entry); } buildPivotTable(); syncWithGoogle("인라인 수정: " + name + " [" + item + "] 수량 " + newVal + " 변경"); }
function makeTimeCellEditable(cell, year, md, name, event) { if (event && event.target.tagName === 'BUTTON') return; var targetSpan = cell.querySelector('.time-display-span'); if (!targetSpan || cell.querySelector('input')) return; var originalValue = targetSpan.innerText === '-' ? '' : targetSpan.innerText; var btn = cell.querySelector('button'); if(btn) btn.style.display = 'none'; targetSpan.innerHTML = '<input type="text" class="inline-edit-input" style="width:100%; font-size:11px;" value="' + originalValue + '" placeholder="예: 오전 9:00 ~ 오후 6:00" onblur="saveInlineTime(this, \'' + year + '\', \'' + md + '\', \'' + name + '\')" onkeydown="if(event.key===\'Enter\') this.blur();">'; var input = targetSpan.querySelector('input'); if(input) { input.focus(); input.select(); } }
function saveInlineTime(input, year, md, name) { var newVal = input.value.trim(); var dateFull = year + "-" + md.replace("/", "-"); var idx = rawEntries.findIndex(function(x) { return x.date === dateFull && x.name === name && x.type === 'attendance'; }); if (!newVal || newVal === '-') { if (idx > -1) rawEntries.splice(idx, 1); } else { var entry = { date: dateFull, name: name, type: 'attendance', item: '통합근무', time: newVal }; if (idx > -1) rawEntries[idx] = entry; else rawEntries.push(entry); } buildPivotTable(); syncWithGoogle("인라인 수정: " + name + " 출퇴근시간 [" + newVal + "] 변경"); }
function addWorkRowData() { var date = document.getElementById('globalWorkDate').value; var entry = { date: date, type: 'admin', name: document.getElementById('admNameSelect').value, item: document.getElementById('admItemSelect').value, cost: Number(document.getElementById('admCost').value)||0, qty: Number(document.getElementById('admQty').value) }; var idx = rawEntries.findIndex(function(x) { return x.date === entry.date && x.name === entry.name && x.item === entry.item && x.type === 'admin'; }); if(idx > -1) rawEntries[idx] = entry; else rawEntries.push(entry); buildPivotTable(); syncWithGoogle("관리자가 [" + entry.name + "] 물량 입력"); }
function saveHourlyRateSetting() { var name = document.getElementById('rateWorkerSelect').value; if(!hourlyRates[name]) hourlyRates[name] = { rate: 9620, customDays: {} }; hourlyRates[name].rate = Number(document.getElementById('hourlyRateInput').value)||0; buildPivotTable(); syncWithGoogle("[" + name + "] 시급원장 금액 변경"); }
function updateRateSettingHint() { var name = document.getElementById('rateWorkerSelect').value; var config = hourlyRates[name] || { rate: 9620, customDays: {} }; document.getElementById('hourlyRateInput').value = config.rate || 9620; }
function updateAdminCostHint() { var s = document.getElementById('admItemSelect'); if(s && s.options.length) document.getElementById('admCost').value = s.options[s.selectedIndex].getAttribute('data-cost'); }

function renderDropdowns() {
    var aN = document.getElementById('admNameSelect'), rN = document.getElementById('rateWorkerSelect'), aI = document.getElementById('admItemSelect'), dW = document.getElementById('delWorkerSelect'), dI = document.getElementById('delItemSelect');
    if(!aN || !rN || !aI || !dW || !dI) return;
    aN.innerHTML = ""; rN.innerHTML = ""; aI.innerHTML = ""; dW.innerHTML = ""; dI.innerHTML = "";
    var safeWorkers = Array.isArray(workersPool) ? workersPool : [];
    safeWorkers.forEach(function(n) { var o = '<option value="' + n + '">' + n + '</option>'; aN.innerHTML += o; rN.innerHTML += o; dW.innerHTML += o; });
    var safeItemPrices = itemPrices || {}; var sortedItemKeys = Object.keys(safeItemPrices).sort(customItemSort);
    sortedItemKeys.forEach(function(i) { aI.innerHTML += '<option value="' + i + '" data-cost="' + safeItemPrices[i] + '">' + i + '</option>'; dI.innerHTML += '<option value="' + i + '">' + i + '</option>'; });
    updateAdminCostHint(); updateRateSettingHint();
}
