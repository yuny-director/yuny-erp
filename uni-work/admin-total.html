        .fix-col-5 { position: sticky !important; left: 295px !important; min-width: 75px; max-width: 95px; background: #fafafa !important; z-index: 10; }
        .fix-col-6 { position: sticky !important; left: 370px !important; min-width: 100px; max-width: 125px; background: #ffffff !important; z-index: 10; }

        th.fix-col-1, th.fix-col-2, th.fix-col-3, th.fix-col-4, th.fix-col-5, th.fix-col-6, th.fix-col-7 { z-index: 40 !important; }

        .subtotal-row { background-color: #fff9db !important; font-weight: bold !important; color: #d9480f !important; }

        .divider { color: #ccc; font-size: 18px; margin: 0 5px; align-self: flex-end; padding-bottom: 10px; }

        <div class="sub-section">
            <h4 style="margin: 0 0 12px 0; color: #2980b9; font-size: 14px;">🗑️ 명단/품목 삭제</h4>
            <div class="flex-form-row">
                <div class="form-group">

            </div>

                <label>품목</label>

            </div>
            <div class="form-group">
                <label>지정단가</label>

<!-- 🎯 [신규] 명단/품목/단가/시급 수정 전용 팝업 모달 -->
<div id="masterEditModal" class="modal" style="display:none; position:fixed; z-index:1000000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.45); align-items:center; justify-content:center;">
    <div class="modal-content" style="background:#fff; padding:25px; border-radius:10px; width:90%; max-width:520px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing:border-box;">
        <h3 style="margin-top:0; margin-bottom:8px; color: #2c3e50;">✏️ 마스터 정보 (명단 / 품목명 / 단가 / 시급) 수정</h3>
        <p style="font-size:12px; color:#666; margin-bottom:15px;">수정할 항목 종류를 선택하신 후 내용을 변경해 주세요.<br>(이름이나 품목명 변경 시 과거 기록도 함께 안전하게 이전됩니다)</p>

        <div class="form-group" style="margin-bottom: 15px; width: 100%;">
            <label>수정 구분 선택</label>
            <select id="editModeSelect" style="width: 100%; height:38px;" onchange="window.onMasterEditModeChange()">
                <option value="worker_name">👷 작업자 이름 수정</option>
                <option value="item_name">📂 품목명 수정</option>
                <option value="item_cost">💵 기본 단가 수정</option>
                <option value="worker_rate">⏱️ 작업자 시급 수정</option>
            </select>
        </div>

        <div class="form-group" style="margin-bottom: 15px; width: 100%;">
            <label id="lblEditTargetSelect">수정 대상 선택</label>
            <select id="editTargetSelect" style="width: 100%; height:38px;" onchange="window.onMasterEditTargetChange()"></select>
        </div>

        <div class="form-group" style="margin-bottom: 20px; width: 100%;">
            <label id="lblEditValueInput">변경할 내용 입력</label>

        <div style="display: flex; justify-content: flex-end; gap: 8px; border-top:1px solid #eee; padding-top:15px;">
            <button class="btn btn-gray" id="btnCloseMasterEditModal">취소</button>
            <button class="btn btn-purple" id="btnSaveMasterEdit">변경사항 저장</button>
        </div>
    </div>
</div>

<div id="sortModal" class="modal" style="display:none; position:fixed; z-index:1000000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.45); align-items:center; justify-content:center;">
    <div class="modal-content" style="background:#fff; padding:25px; border-radius:10px; width:90%; max-width:580px; max-height:85vh; display:flex; flex-direction:column; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing:border-box;">
        <div style="flex-shrink:0;">
            <h3 style="margin-top:0; margin-bottom:8px; color: #2c3e50;">↕️ 품목 순서 임의 조정</h3>
            <p style="font-size:12px; color:#666; margin-bottom:15px;">항목을 마우스로 드래그하여 원하시는 순서대로 배치한 후 하단의 [순서 저장]을 누르세요.</p>
        </div>
        
        <div style="flex:1; overflow-y:auto; padding-right:5px; margin-bottom:15px; border:1px solid #e9ecef; border-radius:6px; padding:10px; background:#f8f9fa;">
            <ul class="sortable-list" id="sortableList"></ul>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 8px; flex-shrink:0; border-top:1px solid #eee; padding-top:15px;">
            <button class="btn btn-gray" id="btnCloseSortModal">취소</button>
            <button class="btn btn-purple" id="btnSaveItemOrder">순서 저장</button>
        </div>
    </div>
</div>

<script>
// 전역 변수
window.workersPool = [];
window.itemPrices = {};
window.rawEntries = [];
window.hourlyRates = {};
window.userList = [];
window.myItemOrder = ["스포이드", "공병", "미스트(핑크)", "미스트(보라)", "지정품목"];

window.customItemSort = function(a, b) {
    try {
        if (!window.myItemOrder || !Array.isArray(window.myItemOrder)) return 0;
        var idxA = window.myItemOrder.indexOf(a);
        var idxB = window.myItemOrder.indexOf(b);
        if (idxA === -1) idxA = 999;
        if (idxB === -1) idxB = 999;
        return idxA - idxB;
    } catch (e) { return 0; }
};

document.addEventListener("DOMContentLoaded", function() {
    var now = new Date();
    var currentYear = now.getFullYear();
    var currentMonth = now.getMonth() + 1;
    var ySel = document.getElementById("filterYear");
    for(var y = currentYear - 2; y <= currentYear + 1; y++) {
        ySel.innerHTML += '<option value="' + y + '" ' + (y===currentYear?'selected':'') + '>' + y + '년</option>';
    }
    var mSel = document.getElementById("filterMonth");
    for(var m = 1; m <= 12; m++) {
        mSel.innerHTML += '<option value="' + m + '" ' + (m===currentMonth?'selected':'') + '>' + m + '월</option>';
    }
    document.getElementById('globalWorkDate').value = now.toISOString().split('T')[0];
    
    ySel.onchange = window.buildPivotTable;
    mSel.onchange = window.buildPivotTable;

    // 이벤트 리스너 바인딩
    document.getElementById("btnAddWorker").addEventListener("click", window.addNewWorker);
    document.getElementById("btnAddItem").addEventListener("click", window.addNewItem);
    document.getElementById("btnDelWorker").addEventListener("click", window.deleteWorker);
    document.getElementById("btnDelItem").addEventListener("click", window.deleteItem);
    document.getElementById("btnSaveRate").addEventListener("click", window.saveHourlyRateSetting);
    document.getElementById("btnRateAllApply").addEventListener("click", function() { window.toggleAllRatesForWorker(true); });
    document.getElementById("btnRateAllExclude").addEventListener("click", function() { window.toggleAllRatesForWorker(false); });
    document.getElementById("btnAddWorkRow").addEventListener("click", window.addWorkRowData);
    document.getElementById("btnSortModal").addEventListener("click", window.openSortModal);
    document.getElementById("btnCloseSortModal").addEventListener("click", window.closeSortModal);
    document.getElementById("btnSaveItemOrder").addEventListener("click", window.saveItemOrder);
    
    // 🎯 [신규] 명단/품목/단가/시급 수정 이벤트 리스너
    document.getElementById("btnMasterEditModal").addEventListener("click", window.openMasterEditModal);
    document.getElementById("btnCloseMasterEditModal").addEventListener("click", window.closeMasterEditModal);
    document.getElementById("btnSaveMasterEdit").addEventListener("click", window.saveMasterEdit);

    document.getElementById("rateWorkerSelect").addEventListener("change", window.updateRateSettingHint);
    document.getElementById("admItemSelect").addEventListener("change", window.updateAdminCostHint);

    window.loadData();
});

window.loadData = function() {
    var scriptUrl = window.GOOGLE_SCRIPT_URL || "https://script.google.com/macros/s/AKfycbyPWv070zApltQFMeq6HUxFAnnBcZfpAXHz5n_vwnmX34kCXqadFumI1BfmJRWu0OZE/exec";
    var cacheUrl = scriptUrl + (scriptUrl.indexOf('?') > -1 ? '&' : '?') + 't=' + Date.now();
    fetch(cacheUrl)
    .then(function(r) { return r.json(); })
    .then(function(data) {
        window.workersPool = Array.isArray(data.workersPool) ? data.workersPool : [];
        window.itemPrices = (data.itemPrices && typeof data.itemPrices === 'object') ? data.itemPrices : {};
        window.rawEntries = Array.isArray(data.rawEntries) ? data.rawEntries : [];
        window.hourlyRates = (data.hourlyRates && typeof data.hourlyRates === 'object') ? data.hourlyRates : {};
        window.userList = Array.isArray(data.userList) ? data.userList : [];
        if(data.itemOrder && Array.isArray(data.itemOrder)) { window.myItemOrder = data.itemOrder; }
        
        window.renderDropdowns();
        window.buildPivotTable();
        if (typeof window.updateNavbarUserDisplay === 'function') window.updateNavbarUserDisplay();
        document.getElementById('loadingStatus').innerText = "✅ 실시간 동기화 완료";
    })
    .catch(function(err) {
        document.getElementById('loadingStatus').innerText = "❌ 데이터 동기화 지연";
        window.buildPivotTable();
    });
};

window.syncWithGoogle = function(msg, callback) {
    document.getElementById('loadingStatus').innerText = "📤 구글 DB 업데이트 중...";
    var scriptUrl = window.GOOGLE_SCRIPT_URL || "https://script.google.com/macros/s/AKfycbyPWv070zApltQFMeq6HUxFAnnBcZfpAXHz5n_vwnmX34kCXqadFumI1BfmJRWu0OZE/exec";
    var payload = {
        action: "syncAll",
        updater: "관리자",
        summary: msg,
        workersPool: window.workersPool,
        itemPrices: window.itemPrices,
        rawEntries: window.rawEntries,
        hourlyRates: window.hourlyRates,
        itemOrder: window.myItemOrder
    };

    fetch(scriptUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
    })
    .then(function(res) { return res.json(); })
    .then(function(resData) {
        document.getElementById('loadingStatus').innerText = "✅ DB 저장 성공!";
        if (callback) callback();
        else window.loadData();
    })
    .catch(function(err) {
        document.getElementById('loadingStatus').innerText = "❌ 저장 완료";
        if (callback) callback();
        else window.loadData();
    });
};

// 🎯 [신규] 명단/품목/단가/시급 통합 수정 모달 로직
window.openMasterEditModal = function() {
    document.getElementById("editModeSelect").value = "worker_name";
    window.onMasterEditModeChange();
    document.getElementById("masterEditModal").style.display = "flex";
};

window.closeMasterEditModal = function() {
    document.getElementById("masterEditModal").style.display = "none";
};

window.onMasterEditModeChange = function() {
    var mode = document.getElementById("editModeSelect").value;
    var targetSel = document.getElementById("editTargetSelect");
    var lblTarget = document.getElementById("lblEditTargetSelect");
    var lblValue = document.getElementById("lblEditValueInput");
    var valInput = document.getElementById("editValueInput");

    targetSel.innerHTML = "";
    valInput.value = "";

    if (mode === "worker_name" || mode === "worker_rate") {
        lblTarget.innerText = "수정할 작업자 선택";
        var workers = Array.isArray(window.workersPool) ? window.workersPool : [];
        workers.forEach(function(w) {
            targetSel.innerHTML += '<option value="' + w + '">' + w + '</option>';
        });
        if (mode === "worker_name") {
            lblValue.innerText = "변경할 작업자 이름 입력";
            valInput.type = "text";
        } else {
            lblValue.innerText = "변경할 기본 시급 입력 (원)";
            valInput.type = "number";
        }
    } else if (mode === "item_name" || mode === "item_cost") {
        lblTarget.innerText = "수정할 품목 선택";
        var items = Object.keys(window.itemPrices || {}).sort(window.customItemSort);
        items.forEach(function(i) {
            targetSel.innerHTML += '<option value="' + i + '">' + i + '</option>';
        });
        if (mode === "item_name") {

window.saveMasterEdit = function() {

        window.rawEntries.forEach(function(e) {

        });

        if (window.itemPrices[newItem] !== undefined) { alert("이미 존재하는 품목명입니다."); return; }

        window.itemPrices[newItem] = window.itemPrices[oldItem];
        delete window.itemPrices[oldItem];

        // 2. myItemOrder 품목 순서 리스트 내 명칭 변경

        alert("[" + item + "] 기본 단가가 " + newCost.toLocaleString() + "원으로 변경되었습니다.");

function calculateHours(timeStr) {
    if(!timeStr || timeStr === "-" || timeStr.indexOf("~") === -1 || timeStr.indexOf("미입력") > -1) return 0;
    try {
        var parts = timeStr.split("~");
        var parseTime = function(t) {
            t = t.trim(); var isPm = t.indexOf("오후") > -1; var clean = t.replace("오전","").replace("오후","").trim();
            var hm = clean.split(":"); var h = Number(hm[0]); var m = Number(hm[1]) || 0;
            if(isPm && h < 12) h += 12; if(!isPm && h === 12) h = 0; return h + (m / 60);
        };
        var diff = parseTime(parts[1]) - parseTime(parts[0]); return diff > 0 ? Number(diff.toFixed(1)) : 0;
    } catch(e) { return 0; }
}

    setTimeout(function(){
        for(var name in workerGrandTotalsMap) {
            var secureId = name.replace(/[^a-zA-Z0-9가-힣]/g, ''); var cell = document.getElementById("grandTotalCell_" + secureId);
            if(cell) { cell.innerText = workerGrandTotalsMap[name].toLocaleString() + "원"; }
        }
        var finalCell = document.getElementById('overallGrandTotalCell'); if(finalCell) { finalCell.innerText = totalFinalGrandSum.toLocaleString() + "원"; }
    }, 30);
};

window.toggleSingleDayRate = function(name, dateFull, currentApply) { if(!window.hourlyRates[name]) window.hourlyRates[name] = { rate: 9620, customDays: {} }; if(!window.hourlyRates[name].customDays) window.hourlyRates[name].customDays = {}; window.hourlyRates[name].customDays[dateFull] = !currentApply; window.buildPivotTable(); window.syncWithGoogle("[" + name + "] " + dateFull + " 반영여부 변경"); };
window.toggleAllRatesForWorker = function(targetStatus) { var name = document.getElementById('rateWorkerSelect').value; var selYear = document.getElementById("filterYear").value; var selMonth = parseInt(document.getElementById("filterMonth").value); var lastDay = new Date(selYear, selMonth, 0).getDate(); if(!window.hourlyRates[name]) window.hourlyRates[name] = { rate: 9620, customDays: {} }; if(!window.hourlyRates[name].customDays) window.hourlyRates[name].customDays = {}; var strMonth = selMonth < 10 ? "0" + selMonth : String(selMonth); for(var d = 1; d <= lastDay; d++) { var strDay = d < 10 ? "0" + d : String(d); var dateFull = selYear + "-" + strMonth + "-" + strDay; window.hourlyRates[name].customDays[dateFull] = targetStatus; } window.buildPivotTable(); window.syncWithGoogle("[" + name + "] 계정 " + selMonth + "월 시급 일괄 정산 변경"); };
window.makeCellEditable = function(cell, year, md, name, item, type, cost) { if (cell.querySelector('input')) return; var originalValue = cell.innerText === '-' ? '0' : cell.innerText.replace('개', ''); cell.innerHTML = '<input type="number" class="inline-edit-input" value="' + originalValue + '" onblur="window.saveInlineQty(this, \'' + year + '\', \'' + md + '\', \'' + name + '\', \'' + item + '\', \'' + type + '\', \'' + cost + '\')" onkeydown="if(event.key===\'Enter\') this.blur();">'; var input = cell.querySelector('input'); if(input) { input.focus(); input.select(); } };
window.saveInlineQty = function(input, year, md, name, item, type, cost) { var newVal = parseInt(input.value) || 0; var dateFull = year + "-" + md.replace("/", "-"); var idx = window.rawEntries.findIndex(function(x) { return x.date === dateFull && x.name === name && x.item === item && x.type === type; }); if (newVal === 0) { if (idx > -1) window.rawEntries.splice(idx, 1); } else { var entry = { date: dateFull, type: type, name: name, item: item, qty: newVal }; if (type === 'admin') entry.cost = Number(cost); if (idx > -1) window.rawEntries[idx] = entry; else window.rawEntries.push(entry); } window.buildPivotTable(); window.syncWithGoogle("인라인 수정: " + name + " [" + item + "] 수량 " + newVal + " 변경"); };
window.makeTimeCellEditable = function(cell, year, md, name, event) { if (event && event.target.tagName === 'BUTTON') return; var targetSpan = cell.querySelector('.time-display-span'); if (!targetSpan || cell.querySelector('input')) return; var originalValue = targetSpan.innerText === '-' ? '' : targetSpan.innerText; var btn = cell.querySelector('button'); if(btn) btn.style.display = 'none'; targetSpan.innerHTML = '<input type="text" class="inline-edit-input" style="width:100%; font-size:11px;" value="' + originalValue + '" placeholder="예: 오전 9:00 ~ 오후 6:00" onblur="window.saveInlineTime(this, \'' + year + '\', \'' + md + '\', \'' + name + '\')" onkeydown="if(event.key===\'Enter\') this.blur();">'; var input = targetSpan.querySelector('input'); if(input) { input.focus(); input.select(); } };
window.saveInlineTime = function(input, year, md, name) { var newVal = input.value.trim(); var dateFull = year + "-" + md.replace("/", "-"); var idx = window.rawEntries.findIndex(function(x) { return x.date === dateFull && x.name === name && x.type === 'attendance'; }); if (!newVal || newVal === '-') { if (idx > -1) window.rawEntries.splice(idx, 1); } else { var entry = { date: dateFull, name: name, type: 'attendance', item: '통합근무', time: newVal }; if (idx > -1) window.rawEntries[idx] = entry; else window.rawEntries.push(entry); } window.buildPivotTable(); window.syncWithGoogle("인라인 수정: " + name + " 출퇴근시간 [" + newVal + "] 변경"); };
window.addWorkRowData = function() { var date = document.getElementById('globalWorkDate').value; var entry = { date: date, type: 'admin', name: document.getElementById('admNameSelect').value, item: document.getElementById('admItemSelect').value, cost: Number(document.getElementById('admCost').value)||0, qty: Number(document.getElementById('admQty').value) }; var idx = window.rawEntries.findIndex(function(x) { return x.date === entry.date && x.name === entry.name && x.item === entry.item && x.type === 'admin'; }); if(idx > -1) window.rawEntries[idx] = entry; else window.rawEntries.push(entry); window.buildPivotTable(); window.syncWithGoogle("관리자가 [" + entry.name + "] 물량 입력"); };
window.saveHourlyRateSetting = function() { var name = document.getElementById('rateWorkerSelect').value; if(!window.hourlyRates[name]) window.hourlyRates[name] = { rate: 9620, customDays: {} }; window.hourlyRates[name].rate = Number(document.getElementById('hourlyRateInput').value)||0; window.buildPivotTable(); window.syncWithGoogle("[" + name + "] 시급원장 금액 변경"); };
window.updateRateSettingHint = function() { var name = document.getElementById('rateWorkerSelect').value; var config = window.hourlyRates[name] || { rate: 9620, customDays: {} }; document.getElementById('hourlyRateInput').value = config.rate || 9620; };
window.updateAdminCostHint = function() { var s = document.getElementById('admItemSelect'); if(s && s.options.length) document.getElementById('admCost').value = s.options[s.selectedIndex].getAttribute('data-cost'); };

window.renderDropdowns = function() {
    var aN = document.getElementById('admNameSelect'), rN = document.getElementById('rateWorkerSelect'), aI = document.getElementById('admItemSelect'), dW = document.getElementById('delWorkerSelect'), dI = document.getElementById('delItemSelect');
    if(!aN || !rN || !aI || !dW || !dI) return;
    aN.innerHTML = ""; rN.innerHTML = ""; aI.innerHTML = ""; dW.innerHTML = ""; dI.innerHTML = "";
    var safeWorkers = Array.isArray(window.workersPool) ? window.workersPool : [];
    safeWorkers.forEach(function(n) { var o = '<option value="' + n + '">' + n + '</option>'; aN.innerHTML += o; rN.innerHTML += o; dW.innerHTML += o; });
    var safeItemPrices = window.itemPrices || {}; var sortedItemKeys = Object.keys(safeItemPrices).sort(window.customItemSort);
    sortedItemKeys.forEach(function(i) { aI.innerHTML += '<option value="' + i + '" data-cost="' + safeItemPrices[i] + '">' + i + '</option>'; dI.innerHTML += '<option value="' + i + '">' + i + '</option>'; });
    window.updateAdminCostHint(); window.updateRateSettingHint();
};
</script>
