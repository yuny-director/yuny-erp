<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUNY_ERP - 통합 전체 재고관리 원장</title>
    <style>
        html { margin: 0; padding: 0; background-color: #f4f6f9; font-family: Arial, sans-serif; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; padding-top: 50px !important; background-color: #f4f6f9; }
        .content { padding: 15px; }
        
        .flex-form-row { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 12px; margin-bottom: 15px; }
        .card { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 6px; font-weight: bold; font-size: 14px; color: #333; height: 16px; line-height: 16px; }
        .form-group input, .form-group select { padding: 0 10px; border: 1px solid #ccc; border-radius: 4px; width: 160px; height: 38px; box-sizing: border-box; font-size: 14px !important; font-family: Arial, sans-serif; background-color: #ffffff; }
        
        .btn { padding: 0 18px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; height: 38px; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; transition: background 0.2s; box-sizing: border-box; }
        .btn-green { background-color: #27ae60; } .btn-green:hover { background-color: #219653; }
        .btn-red { background-color: #e74c3c; } .btn-red:hover { background-color: #c0392b; }
        .btn-purple { background-color: #9b59b6; } .btn-purple:hover { background-color: #8e44ad; }
        .btn-gray { background-color: #7f8c8d; } .btn-gray:hover { background-color: #6c7a7d; }
        .btn-blue { background-color: #2980b9; } .btn-blue:hover { background-color: #1f618d; }
        .btn-orange { background-color: #e67e22; } .btn-orange:hover { background-color: #d35400; }
        
        .table-container { width: 100%; max-height: 70vh; overflow: auto !important; border: 1px solid #ccc; border-radius: 6px; background: white; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate !important; border-spacing: 0 !important; font-size: 13px; width: auto; min-width: 100%; table-layout: fixed; }
        th, td { padding: 10px 8px; text-align: center; white-space: nowrap; box-sizing: border-box; border-right: 1px solid #ccc !important; border-bottom: 1px solid #ccc !important; border-left: none !important; border-top: none !important; }
        th { background-color: #f8f9fa !important; font-weight: bold; position: sticky !important; top: 0 !important; z-index: 30 !important; border-top: 1px solid #ccc !important; }
        
        .fix-col-1 { position: sticky !important; left: 0px !important; min-width: 180px; background: #ffffff !important; z-index: 10; border-left: 1px solid #ccc !important; text-align: left !important; padding-left: 10px !important; }
        .fix-col-2 { position: sticky !important; left: 180px !important; min-width: 150px; background: #ffffff !important; z-index: 10; text-align: left !important; padding-left: 10px !important; }
        .fix-col-3 { position: sticky !important; left: 330px !important; min-width: 60px; max-width: 70px; background: #ffffff !important; z-index: 10; }
        .fix-col-4 { position: sticky !important; left: 390px !important; min-width: 90px; max-width: 100px; background: #fafafa !important; z-index: 10; border-right: 2px solid #aaa !important; }
        
        th.fix-col-1, th.fix-col-2, th.fix-col-3, th.fix-col-4 { z-index: 40 !important; text-align: center !important; padding-left: 0 !important; }
        
        .row-now-stock { background-color: #fff9db !important; font-weight: bold; color: #e67e22; }
        .row-now-stock td { background-color: #fff9db !important; }
        .text-in { color: #27ae60; font-weight: bold; }
        .text-out { color: #e74c3c; font-weight: bold; }
        .divider { color: #ccc; font-size: 18px; margin: 0 5px; align-self: flex-end; padding-bottom: 10px; }
        
        .editable-cell { cursor: pointer; }
        .editable-cell:hover { background-color: #e8f4fd !important; }
        .inline-edit-input { width: 90%; height: 26px; text-align: center; border: 2px solid #2980b9; border-radius: 4px; font-weight: bold; }

        .sortable-list { list-style: none; padding: 0; margin: 0; max-height: 55vh; overflow-y: auto; padding-right: 5px; }
        .sortable-item { padding: 10px 14px; margin-bottom: 8px; background-color: #f8f9fa; border: 1px solid #ced4da; border-radius: 6px; cursor: grab; font-weight: bold; font-size: 13px; color: #2c3e50; display: flex; align-items: center; justify-content: space-between; }
        .sortable-item.dragging { opacity: 0.5; background-color: #e8f4fd; border: 2px dashed #2980b9; }

        .multi-delete-container { max-height: 160px; overflow-y: auto; border: 1px solid #ced4da; border-radius: 6px; padding: 10px; background: #fafafa; margin-top: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
        .multi-delete-item { display: flex; align-items: center; gap: 6px; background: white; padding: 6px 10px; border: 1px solid #e9ecef; border-radius: 4px; font-size: 12px; font-weight: bold; color: #333; cursor: pointer; }
        .multi-delete-item:hover { background: #fff5f5; border-color: #ffa8a8; }
    </style>
    <script>
        document.write('<script src="../config.js?t=' + Date.now() + '"><\/script>');
    </script>
</head>
<body>

<div id="global-navbar"></div>
<script>
    document.write('<script src="../navbar2.js?v=2026_stock_modal_fixed&t=' + Date.now() + '"><\/script>');
</script>

<div class="content">
    <div class="card" style="background-color: #fff9db; border: 2px solid #fab005; padding: 12px 25px;">
        <div class="flex-form-row" style="margin-bottom: 0; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="color: #e67e22; font-weight: bold; margin: 0;">📅 원장 선택 연월 :</label>
                <select id="filterYear" style="width: 100px; height:36px;"></select>
                <select id="filterMonth" style="width: 80px; height:36px;"></select>
                <span id="loadingStatus" style="font-weight: bold; color: #27ae60; font-size:14px; margin-left: 15px; display: inline-flex; align-items: center;">🔄 데이터 로드 중...</span>
            </div>
            <button class="btn btn-blue" onclick="downloadStockExcel()">📥 현재 화면 엑셀(CSV) 다운로드</button>
        </div>
    </div>

    <div class="card" style="background-color: #f8f9fa; border: 1px solid #ced4da;">
        <h2 style="margin-top:0;">📂 엑셀(CSV) 데이터 대량 업로드</h2>
        <div class="flex-form-row">
            <div class="form-group">
                <label>업로드 구분</label>
                <select id="uploadType" style="width: 160px;">
                    <option value="item">품목 마스터 등록</option>
                    <option value="entry">입·출고 내역 등록</option>
                </select>
            </div>
            <div class="form-group">
                <label>CSV 파일 선택</label>
                <input type="file" id="csvFileInput" accept=".csv" style="width: 250px; padding: 4px;">
            </div>
            <button class="btn btn-orange" onclick="processCSVUpload()">🚀 대량 업로드 실행</button>
            <div class="divider">|</div>
            <button class="btn btn-gray" onclick="downloadCSVTemplate('item')">📄 1. 품목등록 양식 받기</button>
            <button class="btn btn-gray" onclick="downloadCSVTemplate('entry')">📄 2. 입출고등록 양식 받기</button>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin:0;">🗂️ 독립 재고 품목 마스터 제어</h2>
            <button class="btn btn-purple" onclick="openStockSortModal()">📊 품목 표시순서 관리</button>
        </div>
        
        <div class="flex-form-row" style="margin-bottom: 15px;">
            <div class="form-group">
                <label>새 품목명</label>
                <input type="text" id="newStockItemName" placeholder="예: 스포이드" style="width: 180px;">
            </div>
            <div class="form-group">
                <label>새 모델명</label>
                <input type="text" id="newStockModelName" placeholder="예: 핑크 50ml" style="width: 150px;">
            </div>
            <button class="btn btn-purple" onclick="addStockItemMaster()">품목 단일 등록</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #e9ecef; margin: 15px 0;">

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold; font-size: 13px; color: #e74c3c;">🗑️ 품목 선택 다중 일괄 삭제 (잘못 등록된 품목 여러 개를 체크 후 삭제하세요)</span>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-gray" style="height: 32px; font-size: 12px; padding: 0 10px;" onclick="toggleAllMultiDeleteCheckboxes(true)">☑️ 전체 선택</button>
                <button class="btn btn-gray" style="height: 32px; font-size: 12px; padding: 0 10px;" onclick="toggleAllMultiDeleteCheckboxes(false)">⬜ 전체 해제</button>
                <button class="btn btn-red" style="height: 32px; font-size: 12px; padding: 0 12px;" onclick="deleteSelectedStockItemsMulti()">🗑️ 선택 항목 일괄 삭제</button>
            </div>
        </div>

        <div class="multi-delete-container" id="multiDeleteBox"></div>
    </div>

    <div class="card">
        <h2>📥 일일 입·출고 수량 기록 등록</h2>
        <div class="flex-form-row">
            <div class="form-group">
                <label>선택 등록일자</label>
                <input type="date" id="stockWorkDate" style="width: 150px;">
            </div>
            <div class="form-group">
                <label>대상 품목 선택 (품목명 - 모델명)</label>
                <select id="stockItemSelect" style="width: 260px;"></select>
            </div>
            <div class="form-group">
                <label>기록 수량</label>
                <input type="number" id="stockQty" value="100" style="width: 100px;">
            </div>
            <button class="btn btn-green" onclick="addStockEntry('in')">📦 입고 등록</button>
            <button class="btn btn-red" onclick="addStockEntry('out')">📤 출고 등록</button>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin:0;">📊 전체 품목별 수량 변동 및 현재고 대장</h2>
            <div style="display: flex; align-items: center; gap: 8px;">
                <label style="font-size: 13px; font-weight: bold; color: #2c3e50;">🔀 대장 정렬 기준 :</label>
                <select id="stockTableSortOption" style="width: 180px; height: 36px; font-weight: bold;" onchange="buildStockTable()">
                    <option value="custom">지정된 표시순서 (기본)</option>
                    <option value="name_asc">품목명 오름차순 (가~하)</option>
                    <option value="name_desc">품목명 내림차순 (하~가)</option>
                    <option value="model_asc">모델명 오름차순 (가~하)</option>
                    <option value="model_desc">모델명 내림차순 (하~가)</option>
                    <option value="stock_desc">현재고 높은순 ⬇</option>
                    <option value="stock_asc">현재고 낮은순 ⬆</option>
                    <option value="out_desc">당월 출고 높은순 ⬇</option>
                    <option value="out_asc">당월 출고 낮은순 ⬆</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table id="stockTable"></table>
        </div>
    </div>
</div>

<!-- 🎯 [수정] 모달 높이 고정(max-height: 85vh) 및 내부 스크롤 적용 구조 -->
<div id="stockSortModal" class="modal" style="display:none; position:fixed; z-index:1000000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.45); align-items:center; justify-content:center;">
    <div class="modal-content" style="background:#fff; padding:25px; border-radius:10px; width:90%; max-width:580px; max-height:85vh; display:flex; flex-direction:column; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing:border-box;">
        <div style="flex-shrink:0;">
            <h3 style="margin-top:0; margin-bottom:8px; color: #2c3e50;">↕️ 재고 품목 표시 순서 임의 조정</h3>
            <p style="font-size:12px; color:#666; margin-bottom:15px;">항목을 마우스로 드래그하여 원하시는 순서대로 배치한 후 하단의 [순서 저장]을 누르세요.</p>
        </div>
        
        <!-- 품목 리스트 영역 스크롤 제어 -->
        <div style="flex:1; overflow-y:auto; padding-right:5px; margin-bottom:15px; border:1px solid #e9ecef; border-radius:6px; padding:10px; background:#f8f9fa;">
            <ul class="sortable-list" id="stockSortableList" style="max-height:none;"></ul>
        </div>
        
        <!-- 하단 버튼 영역 고정 -->
        <div style="display: flex; justify-content: flex-end; gap: 8px; flex-shrink:0; border-top:1px solid #eee; padding-top:15px;">
            <button class="btn btn-gray" onclick="closeStockSortModal()">취소</button>
            <button class="btn btn-purple" onclick="saveStockItemOrder()">순서 저장</button>
        </div>
    </div>
</div>

<script>
    var stockItems = []; 
    var stockEntries = []; 
    var isDataLoaded = false;

    window.onload = function() {
        var now = new Date(); var currentYear = now.getFullYear(); var currentMonth = now.getMonth() + 1;
        var ySel = document.getElementById("filterYear");
        for(var y = currentYear - 2; y <= currentYear + 1; y++) { ySel.innerHTML += `<option value="${y}" ${y===currentYear?'selected':''}>${y}년</option>`; }
        var mSel = document.getElementById("filterMonth");
        for(var m = 1; m <= 12; m++) { mSel.innerHTML += `<option value="${m}" ${m===currentMonth?'selected':''}>${m}월</option>`; }
        
        document.getElementById('stockWorkDate').value = now.toISOString().split('T')[0];
        ySel.onchange = buildStockTable; mSel.onchange = buildStockTable;
        loadData();
    };

    function loadData() {
        var cacheUrl = GOOGLE_SCRIPT_URL + (GOOGLE_SCRIPT_URL.indexOf('?') > -1 ? '&' : '?') + 't=' + Date.now();
        fetch(cacheUrl).then(r => r.json()).then(data => {
            stockItems = Array.isArray(data.stockItems) ? data.stockItems : [];
            stockEntries = Array.isArray(data.stockEntries) ? data.stockEntries : [];

            stockEntries.forEach(e => {
                if (e.item && !e.itemName) {
                    e.itemName = e.item;
                    e.modelName = "기본";
                }
            });

            isDataLoaded = true;
            renderDropdowns();
            renderMultiDeleteBox();
            buildStockTable();
            handleTopNavbarSessionName();
            document.getElementById('loadingStatus').innerText = "✅ 재고원장 동기화 완료";
        }).catch(err => {
            document.getElementById('loadingStatus').innerText = "❌ 데이터 동기화 지연";
        });
    }

    function syncWithGoogle(msg) {
        if (!isDataLoaded) return;
        document.getElementById('loadingStatus').innerText = "📤 재고 원장 자동 저장 중...";
        
        var payload = { 
            action: "syncStock", 
            updater: "관리자", 
            summary: msg, 
            stockEntries: stockEntries,
            stockItems: stockItems
        };
        
        fetch(GOOGLE_SCRIPT_URL, { 
            method: 'POST', 
            headers: { 'Content-Type': 'text/plain' }, 
            body: JSON.stringify(payload) 
        })
        .then(res => res.json())
        .then(() => { setTimeout(loadData, 150); })
        .catch(err => { document.getElementById('loadingStatus').innerText = "❌ 실시간 저장 실패"; });
    }

    function downloadCSVTemplate(targetType) {
        var csvContent = "\uFEFF";
        var fileName = "";

        if(targetType === 'item') {
            csvContent += "품목명,모델명\n스포이드,핑크 50ml\n공병,투명 100ml\n";
            fileName = "재고_품목등록_양식.csv";
        } else {
            csvContent += "일자,품목명,모델명,구분,수량\n2026-07-01,스포이드,핑크 50ml,입고,100\n2026-07-01,스포이드,핑크 50ml,출고,20\n";
            fileName = "재고_입출고등록_양식.csv";
        }

        var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        var link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
    }

    function processCSVUpload() {
        var fileInput = document.getElementById('csvFileInput');
        var file = fileInput.files[0];
        if(!file) { alert("업로드할 CSV 파일을 먼저 선택하세요!"); return; }

        var type = document.getElementById('uploadType').value;
        var reader = new FileReader();

        reader.onload = function(e) {
            var buffer = e.target.result;
            var text = "";

            try {
                var decoderUtf8 = new TextDecoder('utf-8', { fatal: true });
                text = decoderUtf8.decode(buffer);
            } catch(err) {
                var decoderEuc = new TextDecoder('euc-kr');
                text = decoderEuc.decode(buffer);
            }

            var lines = text.split(/\r\n|\n/);
            var addedCount = 0;

            for(var i = 1; i < lines.length; i++) {
                var line = lines[i].trim();
                if(!line) continue;
                var cols = line.split(",").map(c => c.trim().replace(/^"|"$/g, ''));

                if(type === 'item') {
                    var iName = cols[0], mName = cols[1];
                    if(iName && mName) {
                        var exists = stockItems.find(x => x.itemName === iName && x.modelName === mName);
                        if(!exists) {
                            stockItems.push({ itemName: iName, modelName: mName });
                            addedCount++;
                        }
                    }
                } else if(type === 'entry') {
                    var date = cols[0], iName = cols[1], mName = cols[2], ioText = cols[3], qty = parseInt(cols[4]) || 0;
                    var ioType = (ioText === '입고' || ioText === 'in') ? 'in' : ((ioText === '출고' || ioText === 'out') ? 'out' : '');

                    if(date && iName && mName && ioType && qty > 0) {
                        var idx = stockEntries.findIndex(x => x.date === date && x.itemName === iName && x.modelName === mName && x.type === ioType);
                        var entry = { date: date, itemName: iName, modelName: mName, type: ioType, qty: qty };
                        if(idx > -1) stockEntries[idx] = entry;
                        else stockEntries.push(entry);
                        addedCount++;
                    }
                }
            }

            fileInput.value = "";
            renderDropdowns();
            renderMultiDeleteBox();
            buildStockTable();
            syncWithGoogle(`CSV 대량 업로드 완료 (${addedCount}건 처리)`);
            alert(`성공적으로 ${addedCount}건의 데이터가 정밀 등록되었습니다!`);
        };

        reader.readAsArrayBuffer(file);
    }

    function downloadStockExcel() {
        var selYear = document.getElementById("filterYear").value;
        var selMonth = document.getElementById("filterMonth").value;
        var table = document.getElementById('stockTable');
        if(!table) return;

        var csvContent = "\uFEFF";
        var rows = table.querySelectorAll("tr");

        rows.forEach(row => {
            var cols = row.querySelectorAll("th, td");
            var rowData = [];
            cols.forEach(col => {
                var text = col.innerText.replace(/\n/g, ' ').replace(/,/g, '');
                rowData.push('"' + text + '"');
            });
            csvContent += rowData.join(",") + "\n";
        });

        var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        var link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `YUNY_ERP_재고원장_${selYear}년${selMonth}월.csv`;
        link.click();
    }

    function addStockItemMaster() {
        var iName = document.getElementById('newStockItemName').value.trim();
        var mName = document.getElementById('newStockModelName').value.trim();
        if(!iName || !mName) { alert("품목명과 모델명을 모두 입력해주세요!"); return; }
        
        var exists = stockItems.find(x => x.itemName === iName && x.modelName === mName);
        if(exists) { alert("이미 존재하는 품목+모델 조합입니다."); return; }
        
        stockItems.push({ itemName: iName, modelName: mName });
        document.getElementById('newStockItemName').value = "";
        document.getElementById('newStockModelName').value = "";
        
        renderDropdowns(); renderMultiDeleteBox(); buildStockTable();
        syncWithGoogle(`독립 재고품목 등록: ${iName}(${mName})`);
    }

    function renderMultiDeleteBox() {
        var box = document.getElementById('multiDeleteBox');
        if(!box) return;
        box.innerHTML = "";

        if(stockItems.length === 0) {
            box.innerHTML = "<div style='color:#888; font-size:12px; padding:10px;'>등록된 품목이 없습니다.</div>";
            return;
        }

        stockItems.forEach((item, idx) => {
            var valStr = item.itemName + "|" + item.modelName;
            var label = document.createElement('label');
            label.className = "multi-delete-item";
            label.innerHTML = `<input type="checkbox" class="chk-multi-del" value="${valStr}"> <span>${item.itemName} (${item.modelName})</span>`;
            box.appendChild(label);
        });
    }

    function toggleAllMultiDeleteCheckboxes(status) {
        var chks = document.querySelectorAll('.chk-multi-del');
        chks.forEach(c => c.checked = status);
    }

    function deleteSelectedStockItemsMulti() {
        var checkedList = Array.prototype.slice.call(document.querySelectorAll('.chk-multi-del:checked'));
        if(checkedList.length === 0) {
            alert("삭제할 품목을 하나 이상 선택해주세요!");
            return;
        }

        if(confirm(`선택하신 ${checkedList.length}개의 품목을 정말로 일괄 삭제하시겠습니까?\n(해당 품목의 입출고 기록도 함께 정돈됩니다)`)) {
            var deleteKeys = checkedList.map(c => c.value);

            stockItems = stockItems.filter(item => {
                var key = item.itemName + "|" + item.modelName;
                return deleteKeys.indexOf(key) === -1;
            });

            stockEntries = stockEntries.filter(entry => {
                var key = entry.itemName + "|" + entry.modelName;
                return deleteKeys.indexOf(key) === -1;
            });

            renderDropdowns();
            renderMultiDeleteBox();
            buildStockTable();
            syncWithGoogle(`다중 일괄 품목 삭제: ${checkedList.length}건 처리`);
            alert(`선택한 ${checkedList.length}개 품목이 성공적으로 삭제되었습니다.`);
        }
    }

    function openStockSortModal() {
        var listContainer = document.getElementById("stockSortableList");
        if(!listContainer) return;
        listContainer.innerHTML = "";

        if(stockItems.length === 0) {
            listContainer.innerHTML = "<li style='padding:15px; color:#888;'>등록된 품목이 없습니다.</li>";
            document.getElementById("stockSortModal").style.display = "flex";
            return;
        }

        stockItems.forEach(item => {
            var li = document.createElement("li");
            li.className = "sortable-item";
            li.draggable = true;
            li.setAttribute("data-item", item.itemName);
            li.setAttribute("data-model", item.modelName);
            li.innerHTML = `<span>📂 ${item.itemName} <small style="color:#8e44ad;">(${item.modelName})</small></span> <span>☰</span>`;
            
            li.addEventListener("dragstart", function() { li.classList.add("dragging"); });
            li.addEventListener("dragend", function() { li.classList.remove("dragging"); });
            listContainer.appendChild(li);
        });

        listContainer.addEventListener("dragover", function(e) {
            e.preventDefault();
            var draggingItem = document.querySelector(".dragging");
            if(!draggingItem) return;
            var siblings = Array.prototype.slice.call(listContainer.querySelectorAll(".sortable-item:not(.dragging)"));
            var nextSibling = siblings.find(function(sibling) {
                return e.clientY <= sibling.getBoundingClientRect().top + sibling.getBoundingClientRect().height / 2;
            });
            listContainer.insertBefore(draggingItem, nextSibling);
        });

        document.getElementById("stockSortModal").style.display = "flex";
    }

    function closeStockSortModal() {
        document.getElementById("stockSortModal").style.display = "none";
    }

    function saveStockItemOrder() {
        var listItems = Array.prototype.slice.call(document.querySelectorAll("#stockSortableList .sortable-item"));
        var newOrderList = [];
        
        listItems.forEach(li => {
            var iName = li.getAttribute("data-item");
            var mName = li.getAttribute("data-model");
            if(iName && mName) {
                newOrderList.push({ itemName: iName, modelName: mName });
            }
        });

        if(newOrderList.length > 0) {
            stockItems = newOrderList;
            renderDropdowns();
            renderMultiDeleteBox();
            buildStockTable();
            syncWithGoogle("재고 품목 표시 순서 변경 저장");
        }
        closeStockSortModal();
    }

    function addStockEntry(ioType) {
        var date = document.getElementById('stockWorkDate').value;
        var val = document.getElementById('stockItemSelect').value;
        var qty = parseInt(document.getElementById('stockQty').value) || 0;
        
        if(!date) { alert("날짜를 선택해 주세요!"); return; }
        if(!val) { alert("품목을 먼저 등록 및 선택해 주세요!"); return; }
        if(qty <= 0) { alert("올바른 수량을 입력해 주세요!"); return; }
        
        var parts = val.split("|");
        var iName = parts[0], mName = parts[1];
        
        var idx = stockEntries.findIndex(x => x.date === date && x.itemName === iName && x.modelName === mName && x.type === ioType);
        var entry = { date: date, itemName: iName, modelName: mName, type: ioType, qty: qty };
        
        if(idx > -1) stockEntries[idx] = entry;
        else stockEntries.push(entry);
        
        buildStockTable();
        syncWithGoogle(`재고 입력 - ${iName}(${mName}) [${ioType === 'in' ? '입고' : '출고'}] ${qty}개 등록`);
    }

    function buildStockTable() {
        var table = document.getElementById('stockTable'); if(!table) return;
        table.innerHTML = "";
        
        if(stockItems.length === 0) {
            table.innerHTML = "<tr><td style='padding: 20px; color: #888;'>등록된 재고 품목이 없습니다. 상단에서 품목을 먼저 등록해주세요.</td></tr>";
            return;
        }

        var selYear = document.getElementById("filterYear").value;
        var selMonth = parseInt(document.getElementById("filterMonth").value);
        var lastDay = new Date(selYear, selMonth, 0).getDate();
        
        var strMonth = selMonth < 10 ? "0" + selMonth : String(selMonth);
        var dateSet = [];
        for(var d = 1; d <= lastDay; d++) { 
            var strDay = d < 10 ? "0" + d : String(d);
            dateSet.push(selYear + "-" + strMonth + "-" + strDay); 
        }
        var currentMonthStart = selYear + "-" + strMonth + "-01";

        var itemCalculatedList = stockItems.map(itemInfo => {
            var iName = itemInfo.itemName;
            var mName = itemInfo.modelName;

            var carryOverStock = 0;
            stockEntries.forEach(e => {
                if (e.itemName === iName && e.modelName === mName && e.date < currentMonthStart) {
                    var q = Number(e.qty) || 0;
                    if (e.type === 'in') carryOverStock += q;
                    else if (e.type === 'out') carryOverStock -= q;
                }
            });

            var monthInSum = 0, monthOutSum = 0;
            dateSet.forEach(dateFull => {
                var inEnt = stockEntries.find(e => e.itemName === iName && e.modelName === mName && e.type === 'in' && e.date === dateFull);
                var outEnt = stockEntries.find(e => e.itemName === iName && e.modelName === mName && e.type === 'out' && e.date === dateFull);
                if (inEnt) monthInSum += Number(inEnt.qty) || 0;
                if (outEnt) monthOutSum += Number(outEnt.qty) || 0;
            });

            var finalMonthStock = carryOverStock + monthInSum - monthOutSum;

            return {
                itemName: iName,
                modelName: mName,
                carryOverStock: carryOverStock,
                monthInSum: monthInSum,
                monthOutSum: monthOutSum,
                finalMonthStock: finalMonthStock
            };
        });

        var sortOptEl = document.getElementById("stockTableSortOption");
        var sortOpt = sortOptEl ? sortOptEl.value : "custom";

        if (sortOpt === "name_asc") {
            itemCalculatedList.sort((a, b) => a.itemName.localeCompare(b.itemName, 'ko'));
        } else if (sortOpt === "name_desc") {
            itemCalculatedList.sort((a, b) => b.itemName.localeCompare(a.itemName, 'ko'));
        } else if (sortOpt === "model_asc") {
            itemCalculatedList.sort((a, b) => a.modelName.localeCompare(b.modelName, 'ko'));
        } else if (sortOpt === "model_desc") {
            itemCalculatedList.sort((a, b) => b.modelName.localeCompare(a.modelName, 'ko'));
        } else if (sortOpt === "stock_desc") {
            itemCalculatedList.sort((a, b) => b.finalMonthStock - a.finalMonthStock);
        } else if (sortOpt === "stock_asc") {
            itemCalculatedList.sort((a, b) => a.finalMonthStock - b.finalMonthStock);
        } else if (sortOpt === "out_desc") {
            itemCalculatedList.sort((a, b) => b.monthOutSum - a.monthOutSum);
        } else if (sortOpt === "out_asc") {
            itemCalculatedList.sort((a, b) => a.monthOutSum - b.monthOutSum);
        }

        var headerHtml = `<thead><tr><th class="fix-col-1">품목명</th><th class="fix-col-2">모델명</th><th class="fix-col-3">구분</th><th class="fix-col-4">총 수량 계</th>${dateSet.map(d => `<th style="min-width:65px;">${d.substring(5).replace("-","/")}</th>`).join('')}</tr></thead>`;
        var bodyHtml = "<tbody>";
        
        itemCalculatedList.forEach(calcItem => {
            var iName = calcItem.itemName;
            var mName = calcItem.modelName;
            var carryOverStock = calcItem.carryOverStock;
            var monthInSum = calcItem.monthInSum;
            var monthOutSum = calcItem.monthOutSum;
            var finalMonthStock = calcItem.finalMonthStock;

            var inRow = `<tr><td class="fix-col-1" rowspan="3" style="font-weight:bold; vertical-align:middle; border-bottom: 2px solid #888 !important; color: #2c3e50;">${iName}</td>`;
            inRow += `<td class="fix-col-2" rowspan="3" style="font-weight:bold; vertical-align:middle; color: #8e44ad; border-bottom: 2px solid #888 !important;">${mName}</td>`;
            inRow += `<td class="fix-col-3 text-in">입고</td><td class="fix-col-4 text-in">${monthInSum.toLocaleString()}개</td>`;
            
            dateSet.forEach(dateFull => {
                var ent = stockEntries.find(e => e.itemName === iName && e.modelName === mName && e.type === 'in' && e.date === dateFull);
                var val = ent ? ent.qty : '-';
                inRow += `<td class="editable-cell" onclick="makeStockInlineEdit(this, '${dateFull}', '${iName}', '${mName}', 'in')">${val}</td>`;
            });
            inRow += `</tr>`; bodyHtml += inRow;

            var outRow = `<tr><td class="fix-col-3 text-out">출고</td><td class="fix-col-4 text-out">${monthOutSum.toLocaleString()}개</td>`;
            dateSet.forEach(dateFull => {
                var ent = stockEntries.find(e => e.itemName === iName && e.modelName === mName && e.type === 'out' && e.date === dateFull);
                var val = ent ? ent.qty : '-';
                outRow += `<td class="editable-cell" onclick="makeStockInlineEdit(this, '${dateFull}', '${iName}', '${mName}', 'out')">${val}</td>`;
            });
            outRow += `</tr>`; bodyHtml += outRow;

            var nowRow = `<tr class="row-now-stock"><td class="fix-col-3" style="border-bottom: 2px solid #888 !important;">현재고</td><td class="fix-col-4" style="border-bottom: 2px solid #888 !important;" title="전월 이월재고: ${carryOverStock.toLocaleString()}개">${finalMonthStock.toLocaleString()}개</td>`;
            var runningStock = carryOverStock; 
            dateSet.forEach(dateFull => {
                var inEnt = stockEntries.find(e => e.itemName === iName && e.modelName === mName && e.type === 'in' && e.date === dateFull);
                var outEnt = stockEntries.find(e => e.itemName === iName && e.modelName === mName && e.type === 'out' && e.date === dateFull);
                var inQ = inEnt ? Number(inEnt.qty) : 0;
                var outQ = outEnt ? Number(outEnt.qty) : 0;
                
                runningStock += (inQ - outQ);
                nowRow += `<td style="border-bottom: 2px solid #888 !important;">${runningStock}</td>`;
            });
            nowRow += `</tr>`; bodyHtml += nowRow;
        });
        
        table.innerHTML = headerHtml + bodyHtml + "</tbody>";
    }

    function makeStockInlineEdit(cell, dateFull, iName, mName, type) {
        if (cell.querySelector('input')) return;
        var originalValue = cell.innerText === '-' ? '0' : cell.innerText;
        cell.innerHTML = `<input type="number" class="inline-edit-input" value="${originalValue}" onblur="saveStockInline(this, '${dateFull}', '${iName}', '${mName}', '${type}')" onkeydown="if(event.key==='Enter') this.blur();">`;
        var input = cell.querySelector('input');
        if(input) { input.focus(); input.select(); }
    }

    function saveStockInline(input, dateFull, iName, mName, type) {
        var newVal = parseInt(input.value) || 0;
        var idx = stockEntries.findIndex(x => x.date === dateFull && x.itemName === iName && x.modelName === mName && x.type === type);
        
        if (newVal === 0) {
            if (idx > -1) stockEntries.splice(idx, 1);
        } else {
            var entry = { date: dateFull, itemName: iName, modelName: mName, type: type, qty: newVal };
            if (idx > -1) stockEntries[idx] = entry;
            else stockEntries.push(entry);
        }
        
        buildStockTable();
        syncWithGoogle(`인라인 수정 - ${iName}(${mName}) [${type === 'in' ? '입고' : '출고'}] 수량 ${newVal} 변경`);
    }

    function renderDropdowns() {
        var sI = document.getElementById('stockItemSelect');
        if(!sI) return;
        
        sI.innerHTML = "";
        
        if(stockItems.length === 0) {
            sI.innerHTML = `<option value="">품목을 등록해주세요</option>`;
            return;
        }

        stockItems.forEach(i => { 
            var valStr = i.itemName + "|" + i.modelName;
            var displayStr = i.itemName + " - " + i.modelName;
            sI.innerHTML += `<option value="${valStr}">${displayStr}</option>`; 
        });
    }

    function handleTopNavbarSessionName() {
        setTimeout(function(){
            var activeName = localStorage.getItem('login_user_name') || "admin";
            var navUserEl = document.getElementById('navbar-user-name');
            if(navUserEl) { navUserEl.innerText = activeName + '님 접속중'; }
        }, 200);
    }
</script>
