<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUNY_ERP - 유니워크 재고관리 원장 (B7 격벽 분리 버전)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f6f9; }
        .content { padding: 15px; }
        .flex-form-row { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 12px; margin-bottom: 15px; }
        .card { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 6px; font-weight: bold; font-size: 14px; color: #333; height: 16px; line-height: 16px; }
        .form-group input, .form-group select { padding: 0 10px; border: 1px solid #ccc; border-radius: 4px; width: 160px; height: 38px; box-sizing: border-box; font-size: 14px !important; font-family: Arial, sans-serif; background-color: #ffffff; }
        .btn { padding: 0 18px; background-color: #1abc9c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; height: 38px; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; transition: background 0.2s; box-sizing: border-box; }
        .btn:hover { background-color: #16a085; }
        
        .table-container { width: 100%; max-height: 70vh; overflow: auto !important; border: 1px solid #ccc; border-radius: 6px; background: white; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate !important; border-spacing: 0 !important; font-size: 13px; width: auto; min-width: 100%; table-layout: fixed; }
        th, td { padding: 12px 10px; text-align: center; white-space: nowrap; box-sizing: border-box; border-right: 1px solid #ccc !important; border-bottom: 1px solid #ccc !important; border-left: none !important; border-top: none !important; }
        th { background-color: #f8f9fa !important; font-weight: bold; position: sticky !important; top: 0 !important; z-index: 30 !important; border-top: 1px solid #ccc !important; }
        
        .editable-cell { cursor: pointer; background-color: #fffde6 !important; font-weight: bold; color: #d9480f; min-width: 70px; }
        .editable-cell:hover { background-color: #fff3bf !important; }
        .inline-edit-input { width: 90%; height: 28px; text-align: center; border: 2px solid #2980b9; border-radius: 4px; font-weight: bold; }
        .inline-edit-input:focus { outline: none; }
    </style>
    <script>
        document.write('<script src="../config.js?t=' + Date.now() + '"><\/script>');
    </script>
</head>
<body>

<div id="global-navbar"></div>
<script>
    document.write('<script src="../navbar2.js?v=2026_stock_fixed&t=' + Date.now() + '"><\/script>');
</script>

<div class="content">
    <div class="card" style="background-color: #fff9db; border: 2px solid #fab005; padding: 15px 25px;">
        <div class="flex-form-row" style="margin-bottom: 0; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="color: #e67e22; font-weight: bold; margin: 0;">📅 재고 원장 확인 연월 :</label>
                <select id="filterYear" style="width: 100px; height:36px;"></select>
                <select id="filterMonth" style="width: 80px; height:36px;"></select>
            </div>
            <span id="loadingStatus" style="font-weight: bold; color: #27ae60; font-size:14px;">🔄 재고 데이터 로드 중...</span>
        </div>
    </div>

    <div class="card">
        <h2 style="font-size:18px; margin-top:0; margin-bottom:15px;">📦 유니워크 실시간 재고 원장 관리표</h2>
        <div class="table-container">
            <table id="stockTable"></table>
        </div>
    </div>
</div>

<script>
    var workersPool = []; var itemPrices = {}; var hourlyRates = {}; var userList = [];
    var myItemOrder = ["스포이드", "공병", "미스트(핑크)", "미스트(보라)", "지정품목"];
    
    // 📦 정산표를 일절 건드리지 않는 순수 단독 재고 원장 배열
    var stockEntries = []; 
    var isDataLoaded = false;

    function customItemSort(a, b) {
        if (!myItemOrder || !Array.isArray(myItemOrder)) return 0;
        var idxA = myItemOrder.indexOf(a); var idxB = myItemOrder.indexOf(b);
        if (idxA === -1) idxA = 999; if (idxB === -1) idxB = 999;
        return idxA - idxB;
    }

    window.onload = function() {
        var now = new Date(); var currentYear = now.getFullYear(); var currentMonth = now.getMonth() + 1;
        var ySel = document.getElementById("filterYear");
        for(var y = currentYear - 2; y <= currentYear + 1; y++) { ySel.innerHTML += `<option value="${y}" ${y===currentYear?'selected':''}>${y}년</option>`; }
        var mSel = document.getElementById("filterMonth");
        for(var m = 1; m <= 12; m++) { mSel.innerHTML += `<option value="${m}" ${m===currentMonth?'selected':''}>${m}월</option>`; }
        
        ySel.onchange = buildStockTable; mSel.onchange = buildStockTable;
        loadData();
    };

    function loadData() {
        var cacheUrl = GOOGLE_SCRIPT_URL + (GOOGLE_SCRIPT_URL.indexOf('?') > -1 ? '&' : '?') + 't=' + Date.now();
        fetch(cacheUrl).then(r => r.json()).then(data => {
            workersPool = data.workersPool || []; itemPrices = data.itemPrices || {};
            hourlyRates = data.hourlyRates || {}; userList = data.userList || [];
            if(data.itemOrder && Array.isArray(data.itemOrder)) { myItemOrder = data.itemOrder; }
            
            // 📦 신설된 B7 셀 서랍장에서 내려오는 독립 재고 내역 수신
            stockEntries = Array.isArray(data.stockEntries) ? data.stockEntries : [];

            isDataLoaded = true;
            buildStockTable();
            handleTopNavbarSessionName();
            document.getElementById('loadingStatus').innerText = "✅ 재고원장 동기화 완료";
        }).catch(err => {
            document.getElementById('loadingStatus').innerText = "❌ 데이터 동기화 지연";
        });
    }

    function syncWithGoogle(msg) {
        if (!isDataLoaded) return;
        document.getElementById('loadingStatus').innerText = "📤 재고 원장 자동 저장 중...";
        
        // 🔒 정산표(B4) 액션과 완전 분리된 독립 재고 전용 파이프라인(syncStock) 가동!!
        var payload = { 
            action: "syncStock", 
            updater: "관리자", 
            summary: msg, 
            stockEntries: stockEntries // 🎯 오직 재고 원장 배열만 깔끔하게 B7 칸으로 슛!
        };
        
        fetch(GOOGLE_SCRIPT_URL, { 
            method: 'POST', 
            headers: { 'Content-Type': 'text/plain' }, 
            body: JSON.stringify(payload) 
        })
        .then(res => res.json())
        .then(() => {
            setTimeout(loadData, 150);
        })
        .catch(err => {
            document.getElementById('loadingStatus').innerText = "❌ 실시간 저장 실패";
        });
    }

    function buildStockTable() {
        var table = document.getElementById('stockTable'); if(!table) return;
        table.innerHTML = "";
        
        var selYear = document.getElementById("filterYear").value;
        var selMonth = parseInt(document.getElementById("filterMonth").value);
        var lastDay = new Date(selYear, selMonth, 0).getDate();
        
        var strMonth = selMonth < 10 ? "0" + selMonth : String(selMonth);
        var dateSet = [];
        for(var d = 1; d <= lastDay; d++) { 
            var strDay = d < 10 ? "0" + d : String(d);
            dateSet.push(selYear + "-" + strMonth + "-" + strDay); 
        }
        
        var headerHtml = `<thead><tr><th style="width:180px;">품목명</th><th style="width:100px;">구분</th><th style="width:120px;">총 재고량</th>${dateSet.map(d => `<th style="min-width:60px;">${d.substring(5).replace("-","/")}</th>`).join('')}</tr></thead>`;
        var bodyHtml = "<tbody>";
        
        var sortedItems = Object.keys(itemPrices).sort(customItemSort);
        
        sortedItems.forEach(item => {
            var sumStockQty = 0;
            dateSet.forEach(dateFull => {
                var sEnt = stockEntries.find(e => e.item === item && e.date === dateFull);
                if(sEnt) sumStockQty += Number(sEnt.qty);
            });
            
            var rowHtml = `<tr>
                <td style="font-weight:bold; text-align:left; padding-left:15px;">${item}</td>
                <td style="color:#2980b9; font-weight:bold;">현재고</td>
                <td style="background-color:#fff3bf; font-weight:bold; color:#e67e22;">${sumStockQty.toLocaleString()}개</td>`;
                
            dateSet.forEach(dateFull => {
                var sEnt = stockEntries.find(e => e.item === item && e.date === dateFull);
                var qtyVal = sEnt ? sEnt.qty : '-';
                rowHtml += `<td class="editable-cell" onclick="makeStockCellEditable(this, '${dateFull}', '${item}')">${qtyVal}</td>`;
            });
            
            bodyHtml += rowHtml + "</tr>";
        });
        
        table.innerHTML = headerHtml + bodyHtml + "</tbody>";
    }

    function makeStockCellEditable(cell, dateFull, item) {
        if (cell.querySelector('input')) return;
        var originalValue = cell.innerText === '-' ? '0' : cell.innerText;
        cell.innerHTML = `<input type="number" class="inline-edit-input" value="${originalValue}" onblur="saveInlineStock(this, '${dateFull}', '${item}')" onkeydown="if(event.key==='Enter') this.blur();">`;
        var input = cell.querySelector('input');
        if(input) { input.focus(); input.select(); }
    }

    function saveInlineStock(input, dateFull, item) {
        var cell = input.parentElement;
        var newVal = parseInt(input.value) || 0;
        
        var idx = stockEntries.findIndex(x => x.date === dateFull && x.item === item);
        
        if (newVal === 0) {
            if (idx > -1) stockEntries.splice(idx, 1);
        } else {
            var entry = { date: dateFull, item: item, qty: newVal };
            if (idx > -1) stockEntries[idx] = entry;
            else stockEntries.push(entry);
        }
        
        buildStockTable();
        syncWithGoogle(`재고 변경: [${item}] 수량 ${newVal}`);
    }

    function handleTopNavbarSessionName() {
        setTimeout(function(){
            var activeName = localStorage.getItem('last_worker_name') || localStorage.getItem('login_user_name') || "관리자";
            var navUserEl = document.getElementById('navbar-user-name');
            if(navUserEl) { navUserEl.innerText = activeName + '님 접속중'; }
        }, 200);
    }
</script>
</body>
</html>
