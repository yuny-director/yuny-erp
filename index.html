<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YUNY_ERP - 로그인</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 360px; text-align: center; }
        .login-box h2 { margin-top: 0; color: #2c3e50; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: #1abc9c; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .status-text { color: #e67e22; font-weight: bold; font-size: 13px; margin-top: 10px; display: none; }
    </style>
    <script src="./config.js"></script>
</head>
<body>
<div class="login-box">
    <h2>YUNY ERP</h2>
    <input type="text" id="username" placeholder="아이디 입력 (한글 가능)">
    <input type="password" id="password" placeholder="비밀번호 입력">
    <button onclick="startLogin()">시스템 접속하기</button>
    <div id="statusMsg" class="status-text">🔄 보안 인증 중...</div>
</div>
<script>
    function startLogin() {
        var id = document.getElementById('username').value.trim();
        var pw = document.getElementById('password').value.trim();
        if(!id || !pw) return;
        document.getElementById('statusMsg').style.display = "block";

        if(typeof GOOGLE_SCRIPT_URL === "undefined" || !GOOGLE_SCRIPT_URL) {
            if(id === "admin" && pw === "1234") { saveSessionAndGo("admin", "관리자"); } else { saveSessionAndGo("worker", id); }
            return;
        }

        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "login", username: id, password: pw }) })
        .then(r => r.json()).then(res => {
            if(res.result === "success") { saveSessionAndGo(res.role, res.name); } 
            else { alert(res.message); document.getElementById('statusMsg').style.display = "none"; }
        }).catch(() => {
            if(id === "admin" && pw === "1234") { saveSessionAndGo("admin", "관리자"); } 
            else { saveSessionAndGo("worker", id); }
        });
    }
    function saveSessionAndGo(role, name) {
        sessionStorage.setItem('erp_role', role);
        sessionStorage.setItem('erp_username', name);
        if(role === 'admin') { location.href = "uni-work/admin-total.html"; } 
        else { location.href = "uni-work/worker-input.html"; }
    }
</script>
</body>
</html>
